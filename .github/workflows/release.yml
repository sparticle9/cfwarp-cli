name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release metadata
        id: relmeta
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must use semantic versions (vMAJOR.MINOR.PATCH), got ${GITHUB_REF_NAME}"
            exit 1
          fi

          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          echo "commit=${GITHUB_SHA::8}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${BUILD_DATE}" >> "${GITHUB_OUTPUT}"


      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          mkdir -p dist
          VERSION="${{ steps.relmeta.outputs.version }}"
          COMMIT="${{ steps.relmeta.outputs.commit }}"
          BUILD_DATE="${{ steps.relmeta.outputs.build_date }}"

          for GOARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build \
              -trimpath \
              -ldflags="-s -w \
                -X github.com/nexus/cfwarp-cli/internal/version.Version=${VERSION} \
                -X github.com/nexus/cfwarp-cli/internal/version.Commit=${COMMIT} \
                -X github.com/nexus/cfwarp-cli/internal/version.Date=${BUILD_DATE}" \
              -o dist/cfwarp-cli-linux-${GOARCH}-${VERSION} .
          done
          cd dist && sha256sum cfwarp-cli-linux-* > sha256sums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cfwarp-cli-linux-amd64-${{ steps.relmeta.outputs.version }}
            dist/cfwarp-cli-linux-arm64-${{ steps.relmeta.outputs.version }}
            dist/sha256sums.txt
