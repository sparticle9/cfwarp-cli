name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          mkdir -p dist
          for GOARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build \
              -trimpath \
              -ldflags="-s -w \
                -X github.com/nexus/cfwarp-cli/internal/version.Version=${GITHUB_REF_NAME} \
                -X github.com/nexus/cfwarp-cli/internal/version.Commit=${GITHUB_SHA::8} \
                -X github.com/nexus/cfwarp-cli/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o dist/cfwarp-cli-linux-${GOARCH} .
          done
          cd dist && sha256sum cfwarp-cli-linux-* > sha256sums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cfwarp-cli-linux-amd64
            dist/cfwarp-cli-linux-arm64
            dist/sha256sums.txt
