name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & Push (${{ matrix.flavor.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        flavor:
          - name: alpine
            dockerfile: Dockerfile
            tag_suffix: ""
            latest_tag: latest
          - name: debian
            dockerfile: Dockerfile.debian
            tag_suffix: -debian
            latest_tag: latest-debian

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve package metadata
        id: pkgmeta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::tag must be semver (vMAJOR.MINOR.PATCH), got ${GITHUB_REF_NAME}"
              exit 1
            fi
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${GITHUB_REF_NAME}-$(git rev-parse --short=12 ${GITHUB_SHA})"
          fi
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${BUILD_DATE}" >> "${GITHUB_OUTPUT}"

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.flavor.tag_suffix }}
            type=ref,event=tag,suffix=${{ matrix.flavor.tag_suffix }}
            type=sha,prefix=sha-,format=short,suffix=${{ matrix.flavor.tag_suffix }}
            type=raw,value=${{ matrix.flavor.latest_tag }},enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.flavor.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.pkgmeta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.pkgmeta.outputs.build_date }}
            SINGBOX_VERSION=1.13.5
          cache-from: type=gha,scope=${{ matrix.flavor.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavor.name }}
