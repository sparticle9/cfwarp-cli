services:
  warp:
    image: ${CFWARP_IMAGE:-ghcr.io/sparticle9/cfwarp-cli:latest}
    container_name: cfwarp-warp
    restart: unless-stopped
    ports:
      - 127.0.0.1:${CFWARP_WIREGUARD_PORT:-16080}:1080
    environment:
      CFWARP_LISTEN_HOST: "0.0.0.0"
      CFWARP_LISTEN_PORT: "1080"
      CFWARP_PROXY_MODE: "socks5"
      CFWARP_LOG_LEVEL: ${CFWARP_LOG_LEVEL:-info}
      CFWARP_STATE_DIR: ${CFWARP_WIREGUARD_STATE_DIR:-/home/cfwarp/.local/state/cfwarp-cli}
    volumes:
      - cfwarp-wireguard-state:${CFWARP_WIREGUARD_STATE_DIR:-/home/cfwarp/.local/state/cfwarp-cli}

  masque:
    image: ${CFWARP_IMAGE:-ghcr.io/sparticle9/cfwarp-cli:latest}
    container_name: cfwarp-masque
    restart: unless-stopped
    ports:
      - 127.0.0.1:${CFWARP_MASQUE_PORT:-16081}:1080
    environment:
      CFWARP_RUNTIME_FAMILY: "native"
      CFWARP_TRANSPORT: "masque"
      CFWARP_MODE: "socks5"
      CFWARP_LISTEN_HOST: "0.0.0.0"
      CFWARP_LISTEN_PORT: "1080"
      CFWARP_LOG_LEVEL: ${CFWARP_LOG_LEVEL:-info}
      CFWARP_STATE_DIR: ${CFWARP_MASQUE_STATE_DIR:-/home/cfwarp/.local/state/cfwarp-cli}
    volumes:
      - cfwarp-masque-state:${CFWARP_MASQUE_STATE_DIR:-/home/cfwarp/.local/state/cfwarp-cli}

  trace-wireguard:
    profiles: ["canary"]
    image: curlimages/curl:8.17.0
    container_name: cfwarp-trace-wireguard
    restart: unless-stopped
    depends_on:
      - warp
    environment:
      ALL_PROXY: socks5h://warp:1080
      HTTPS_PROXY: socks5h://warp:1080
      HTTP_PROXY: socks5h://warp:1080
      NO_PROXY: localhost,127.0.0.1
      TRACE_INTERVAL_SECONDS: ${TRACE_INTERVAL_SECONDS:-60}
    command:
      - sh
      - -ceu
      - |
        while true; do
          ts="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "[$$ts] trace via wireguard"
          out="$$(curl -fsSL https://www.cloudflare.com/cdn-cgi/trace || true)"
          if [ -n "$$out" ]; then
            printf '%s\n' "$$out" | grep -E '^(warp|ip|colo)=' || true
          else
            echo "probe failed"
          fi
          sleep "$${TRACE_INTERVAL_SECONDS}"
        done

  trace-masque:
    profiles: ["canary"]
    image: curlimages/curl:8.17.0
    container_name: cfwarp-trace-masque
    restart: unless-stopped
    depends_on:
      - masque
    environment:
      ALL_PROXY: socks5h://masque:1080
      HTTPS_PROXY: socks5h://masque:1080
      HTTP_PROXY: socks5h://masque:1080
      NO_PROXY: localhost,127.0.0.1
      TRACE_INTERVAL_SECONDS: ${TRACE_INTERVAL_SECONDS:-60}
    command:
      - sh
      - -ceu
      - |
        while true; do
          ts="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "[$$ts] trace via masque"
          out="$$(curl -fsSL https://www.cloudflare.com/cdn-cgi/trace || true)"
          if [ -n "$$out" ]; then
            printf '%s\n' "$$out" | grep -E '^(warp|ip|colo)=' || true
          else
            echo "probe failed"
          fi
          sleep "$${TRACE_INTERVAL_SECONDS}"
        done

volumes:
  cfwarp-wireguard-state:
  cfwarp-masque-state:
