---
# bench.yml — Raw WireGuard tunnel A/B benchmark
#
# ── Topology ─────────────────────────────────────────────────────────────────
#   localhost  Ansible controller — orchestrates only
#   tyo        Proxy host — runs cfwarp + client containers
#   laxhd      Bench target — iperf3-server + nginx in Docker
#
# ── Tags (run stages independently to avoid full restarts) ───────────────────
#   servers        Play 1: start iperf3 + nginx on laxhd
#   prepare        Play 2: pull images, register WARP account on tyo
#   bench-alpine   Play 3a: run measurements for alpine variant only
#   bench-debian   Play 3b: run measurements for debian variant only
#   bench          Play 3: run all variant measurements (both)
#   report         Play 4: generate + fetch markdown report
#   teardown       Play 5: stop laxhd server containers
#
# ── Usage ────────────────────────────────────────────────────────────────────
#   Full run:
#     ansible-playbook -i inventory.ini bench.yml
#
#   Start servers only (once):
#     ansible-playbook -i inventory.ini bench.yml --tags servers
#
#   Skip server setup (already running) and re-run bench:
#     ansible-playbook -i inventory.ini bench.yml --skip-tags servers,prepare
#
#   Re-run just one variant after a failure:
#     ansible-playbook -i inventory.ini bench.yml --tags bench-debian
#
#   Re-generate report from existing CSVs:
#     ansible-playbook -i inventory.ini bench.yml --tags report \
#       -e bench_ts=20260407T125556

# Shared vars referenced across plays via hostvars
# bench_ts:   set in play 3, must be passed with -e if running report standalone
# bench_ip:   resolved in play 2, stored in tyo hostvars


# ── Play 1: Server containers on laxhd ───────────────────────────────────────
- name: "1 · Setup bench servers on laxhd"
  hosts: bench_server
  gather_facts: false
  tags: [servers]

  vars:
    nginx_file_mb: 512

  tasks:
    - name: Find free port for iperf3
      ansible.builtin.shell: |
        port=15201
        while ss -tlnH "( sport = :${port} )" 2>/dev/null | grep -q .; do port=$((port+1)); done
        echo $port
      register: _iperf3_port
      changed_when: false

    - name: Find free port for nginx
      ansible.builtin.shell: |
        taken={{ _iperf3_port.stdout | trim }}
        port=$(( 18080 > taken ? 18080 : taken + 1 ))
        while ss -tlnH "( sport = :${port} )" 2>/dev/null | grep -q .; do port=$((port+1)); done
        echo $port
      register: _nginx_port
      changed_when: false

    - name: Store ports as host facts
      ansible.builtin.set_fact:
        iperf3_port: "{{ _iperf3_port.stdout | trim }}"
        nginx_port:  "{{ _nginx_port.stdout  | trim }}"

    - name: Remove stale bench containers
      ansible.builtin.shell: docker rm -f bench-iperf3 bench-nginx 2>/dev/null || true
      changed_when: false

    - name: Start iperf3 server
      ansible.builtin.shell: |
        docker run -d --name bench-iperf3 \
          -p "{{ _iperf3_port.stdout | trim }}:5201/tcp" \
          -p "{{ _iperf3_port.stdout | trim }}:5201/udp" \
          --restart no networkstatic/iperf3 -s

    - name: Start nginx with tmpfs static file
      ansible.builtin.shell: |
        docker run -d --name bench-nginx \
          -p "{{ _nginx_port.stdout | trim }}:80" \
          --restart no \
          --tmpfs /bench:rw,size={{ nginx_file_mb }}m \
          nginx:alpine sh -c '
            dd if=/dev/urandom of=/bench/data.bin bs=1M count={{ nginx_file_mb }} 2>/dev/null
            cat > /etc/nginx/conf.d/bench.conf <<EOF
        server {
            listen 80; sendfile on;
            location /data.bin { alias /bench/data.bin; }
            location /204      { return 204; }
        }
        EOF
            rm -f /etc/nginx/conf.d/default.conf
            nginx -g "daemon off;"
          '

    - name: Wait for iperf3 port
      ansible.builtin.wait_for:
        port: "{{ _iperf3_port.stdout | trim }}"
        timeout: 30

    - name: Wait for nginx port
      ansible.builtin.wait_for:
        port: "{{ _nginx_port.stdout | trim }}"
        timeout: 120

    - name: Report ports
      ansible.builtin.debug:
        msg: "laxhd  iperf3={{ _iperf3_port.stdout | trim }}  nginx={{ _nginx_port.stdout | trim }}"


# ── Play 2: Prepare tyo ───────────────────────────────────────────────────────
- name: "2 · Prepare warp proxy host (tyo)"
  hosts: warp
  gather_facts: false
  tags: [prepare]

  vars:
    cfwarp_image_alpine: "ghcr.io/sparticle9/cfwarp-cli:latest"
    cfwarp_image_debian: "ghcr.io/sparticle9/cfwarp-cli:latest-debian"
    state_volume: "cfwarp-bench-state"

  tasks:
    - name: Pull alpine image
      ansible.builtin.shell: docker pull {{ cfwarp_image_alpine }}
      changed_when: false

    - name: Pull debian image
      ansible.builtin.shell: docker pull {{ cfwarp_image_debian }}
      changed_when: false

    - name: Check if state volume exists
      ansible.builtin.shell: docker volume inspect {{ state_volume }}
      register: _vol
      changed_when: false
      failed_when: false

    - name: Register WARP account (first run only)
      ansible.builtin.shell: |
        docker run --rm \
          -v {{ state_volume }}:/home/cfwarp/.local/state/cfwarp-cli \
          -e CFWARP_STATE_DIR=/home/cfwarp/.local/state/cfwarp-cli \
          --entrypoint cfwarp-cli \
          {{ cfwarp_image_alpine }} \
          register --state-dir /home/cfwarp/.local/state/cfwarp-cli
      when: _vol.rc != 0

    - name: Ensure state files are world-readable (for distroless uid 65532)
      ansible.builtin.shell: |
        docker run --rm \
          -v {{ state_volume }}:/data \
          alpine chmod -R o+rwX /data
      changed_when: false

    - name: Copy docker stats helper script
      ansible.builtin.copy:
        src: files/docker_stats.sh
        dest: /tmp/docker_stats.sh
        mode: "0755"

    - name: Resolve laxhd IP for container-internal use
      ansible.builtin.set_fact:
        bench_ip: "{{ hostvars[groups['bench_server'][0]].get('ansible_host',
                    lookup('pipe', 'ssh -G ' + groups[\"bench_server\"][0]
                    + \" | awk '/^hostname /{print $2}'\")) }}"

    - name: Show bench_ip
      ansible.builtin.debug:
        msg: "bench_ip={{ bench_ip }}"


# ── Play 3a: Alpine variant ───────────────────────────────────────────────────
- name: "3a · Benchmark — alpine variant"
  hosts: warp
  gather_facts: false
  tags: [bench, bench-alpine]

  vars:
    cfwarp_image_alpine: "ghcr.io/sparticle9/cfwarp-cli:latest"
    state_volume:    "cfwarp-bench-state"
    iperf3_duration: 30
    iperf3_parallel: 4
    runs_lat:        50
    runs_thr:        3
    nginx_file_mb:   512
    container_cpus:  "2"
    container_memory: "512m"
    tunnel_wait_sec: 60
    # Ports: prefer hostvars from play 1; fall back to -e override or defaults.
    # Override with -e iperf3_port=15202 if running this play standalone.
    iperf3_port: "{{ hostvars[groups['bench_server'][0]].get('iperf3_port', iperf3_port_default | default('15201')) }}"
    nginx_port:  "{{ hostvars[groups['bench_server'][0]].get('nginx_port',  nginx_port_default  | default('18080')) }}"
    bench_ip: "{{ hostvars[groups['warp'][0]].get('bench_ip',
                lookup('pipe', 'ssh -G ' + groups[\"bench_server\"][0]
                + \" | awk '/^hostname /{print $2}'\")) }}"

    variant:
      name: alpine
      image: "{{ cfwarp_image_alpine }}"
      state_mount: "/home/cfwarp/.local/state/cfwarp-cli"
      extra_args: ""

  tasks:
    - name: Set bench timestamp (alpine)
      ansible.builtin.set_fact:
        bench_ts: "{{ bench_ts | default(lookup('pipe', 'date +%Y%m%dT%H%M%S')) }}"

    - name: Create results dir and write CSV headers
      ansible.builtin.shell: |
        mkdir -p /tmp/bench-{{ bench_ts }}
        [ -f /tmp/bench-{{ bench_ts }}/latency.csv ] || \
          echo "variant,run,rtt_ms" > /tmp/bench-{{ bench_ts }}/latency.csv
        [ -f /tmp/bench-{{ bench_ts }}/throughput_iperf3.csv ] || \
          echo "variant,run,bits_per_second" > /tmp/bench-{{ bench_ts }}/throughput_iperf3.csv
        [ -f /tmp/bench-{{ bench_ts }}/throughput_http.csv ] || \
          echo "variant,run,time_total_s,size_bytes,speed_bps,http_code" > /tmp/bench-{{ bench_ts }}/throughput_http.csv
        [ -f /tmp/bench-{{ bench_ts }}/container_stats.csv ] || \
          echo "variant,phase,cpu_pct,mem_used,mem_limit,net_rx,net_tx" > /tmp/bench-{{ bench_ts }}/container_stats.csv
      changed_when: false

    - name: Run alpine variant measurements
      ansible.builtin.include_tasks: tasks/bench_variant.yml


# ── Play 3b: Debian variant ───────────────────────────────────────────────────
- name: "3b · Benchmark — debian variant"
  hosts: warp
  gather_facts: false
  tags: [bench, bench-debian]

  vars:
    cfwarp_image_debian: "ghcr.io/sparticle9/cfwarp-cli:latest-debian"
    state_volume:    "cfwarp-bench-state"
    iperf3_duration: 30
    iperf3_parallel: 4
    runs_lat:        50
    runs_thr:        3
    nginx_file_mb:   512
    container_cpus:  "2"
    container_memory: "512m"
    tunnel_wait_sec: 60
    iperf3_port: "{{ hostvars[groups['bench_server'][0]].get('iperf3_port', iperf3_port_default | default('15201')) }}"
    nginx_port:  "{{ hostvars[groups['bench_server'][0]].get('nginx_port',  nginx_port_default  | default('18080')) }}"
    bench_ip: "{{ hostvars[groups['warp'][0]].get('bench_ip',
                lookup('pipe', 'ssh -G ' + groups[\"bench_server\"][0]
                + \" | awk '/^hostname /{print $2}'\")) }}"

    variant:
      name: debian
      image: "{{ cfwarp_image_debian }}"
      # Mount at same path as alpine so account.json (uid 1000) is found
      state_mount: "/home/cfwarp/.local/state/cfwarp-cli"
      extra_args: "--state-dir /home/cfwarp/.local/state/cfwarp-cli"

  tasks:
    - name: Set bench timestamp (debian — reuse alpine ts if set)
      ansible.builtin.set_fact:
        bench_ts: "{{ bench_ts | default(lookup('pipe', 'date +%Y%m%dT%H%M%S')) }}"

    - name: Run debian variant measurements
      ansible.builtin.include_tasks: tasks/bench_variant.yml


# ── Play 4: Report ────────────────────────────────────────────────────────────
- name: "4 · Generate and fetch report"
  hosts: warp
  gather_facts: false
  tags: [report]

  vars:
    cfwarp_image_alpine: "ghcr.io/sparticle9/cfwarp-cli:latest"
    cfwarp_image_debian: "ghcr.io/sparticle9/cfwarp-cli:latest-debian"
    iperf3_duration: 30
    iperf3_parallel: 4
    runs_lat:        50
    runs_thr:        3
    nginx_file_mb:   512
    container_cpus:  "2"
    container_memory: "512m"

  tasks:
    - name: Require bench_ts
      ansible.builtin.fail:
        msg: "bench_ts not set. Pass -e bench_ts=<timestamp> or run bench plays first."
      when: bench_ts is not defined

    - name: Generate markdown report on tyo
      ansible.builtin.shell: |
        D=/tmp/bench-{{ bench_ts }}
        {
        cat <<HEADER
        # cfwarp-cli Benchmark Report

        | Key | Value |
        |-----|-------|
        | Timestamp | {{ bench_ts }} |
        | Proxy host | {{ inventory_hostname }} |
        | Bench server | {{ groups['bench_server'][0] }} |
        | Alpine image | {{ cfwarp_image_alpine }} |
        | Debian image | {{ cfwarp_image_debian }} |
        | Container CPU | {{ container_cpus }} vCPU |
        | Container memory | {{ container_memory }} |
        | iperf3 | {{ iperf3_parallel }} streams × {{ iperf3_duration }}s |
        | Latency probes | {{ runs_lat }} pings per variant |
        | Throughput probes | {{ runs_thr }} runs per variant |
        | HTTP file size | {{ nginx_file_mb }} MB |

        ---

        ## Latency — ping RTT through WireGuard tunnel (ms)

        HEADER

        awk -F, '
        NR>1 && $3!="ERR" {
          v=$1; t=$3+0; cnt[v]++; n=cnt[v]; vals[v,n]=t; sum[v]+=t
        }
        END {
          printf "| Variant | p50 | p95 | p99 | Mean | n |\n"
          printf "|---------|----:|----:|----:|-----:|--:|\n"
          for (v in cnt) {
            n=cnt[v]
            for (i=1;i<=n;i++) for (j=i+1;j<=n;j++)
              if (vals[v,i]>vals[v,j]) { tmp=vals[v,i]; vals[v,i]=vals[v,j]; vals[v,j]=tmp }
            printf "| %-8s | %.1f | %.1f | %.1f | %.1f | %d |\n",
              v, vals[v,int(n*0.50)+1], vals[v,int(n*0.95)+1], vals[v,int(n*0.99)+1], sum[v]/n, n
          }
        }' $D/latency.csv

        printf "\n---\n\n## Throughput — iperf3 raw WireGuard (Mbit/s)\n\n"
        awk -F, '
        NR>1 && $3!="ERR" && $3>0 {
          v=$1; b=$3+0; cnt[v]++; n=cnt[v]; vals[v,n]=b; sum[v]+=b
          if (b>mx[v]) mx[v]=b
        }
        END {
          printf "| Variant | Median | p95 | Max | Mean | n |\n"
          printf "|---------|-------:|----:|----:|-----:|--:|\n"
          for (v in cnt) {
            n=cnt[v]
            for (i=1;i<=n;i++) for (j=i+1;j<=n;j++)
              if (vals[v,i]>vals[v,j]) { tmp=vals[v,i]; vals[v,i]=vals[v,j]; vals[v,j]=tmp }
            printf "| %-8s | %.1f | %.1f | %.1f | %.1f | %d |\n",
              v, vals[v,int(n*0.50)+1]/1e6, vals[v,int(n*0.95)+1]/1e6,
              mx[v]/1e6, (sum[v]/n)/1e6, n
          }
        }' $D/throughput_iperf3.csv

        printf "\n---\n\n## Throughput — HTTP download (MB/s)\n\n"
        awk -F, '
        NR>1 && $5!="ERR" && $5>0 {
          v=$1; s=$5+0; cnt[v]++; n=cnt[v]; vals[v,n]=s; sum[v]+=s
        }
        END {
          printf "| Variant | Median | Mean | n |\n"
          printf "|---------|-------:|-----:|--:|\n"
          for (v in cnt) {
            n=cnt[v]
            for (i=1;i<=n;i++) for (j=i+1;j<=n;j++)
              if (vals[v,i]>vals[v,j]) { tmp=vals[v,i]; vals[v,i]=vals[v,j]; vals[v,j]=tmp }
            printf "| %-8s | %.2f | %.2f | %d |\n",
              v, vals[v,int(n*0.50)+1]/1024/1024, (sum[v]/n)/1024/1024, n
          }
        }' $D/throughput_http.csv

        printf "\n---\n\n## Resource Usage (docker stats)\n\n"
        printf "| Variant | Phase | CPU%% | Mem Used | Mem Limit | Net RX | Net TX |\n"
        printf "|---------|-------|------:|---------:|----------:|-------:|-------:|\n"
        awk -F, 'NR>1 {
          printf "| %-8s | %-12s | %-6s | %-10s | %-10s | %-8s | %-8s |\n",
            $1,$2,$3,$4,$5,$6,$7
        }' $D/container_stats.csv

        printf "\n---\n\n## Efficiency — Mbit/s per CPU%%\n\n"
        printf "| Variant | Mbit/s (median) | CPU%% (throughput) | Mbit/s / CPU%% |\n"
        printf "|---------|----------------:|------------------:|---------------:|\n"
        awk -F, '
        FILENAME ~ /iperf/ && NR>1 && $3!="ERR" && $3>0 {
          v=$1; b=$3+0; icnt[v]++; ivals[v,icnt[v]]=b
        }
        FILENAME ~ /stats/ && NR>1 && $2=="throughput" {
          v=$1; c=$3; sub(/%/,"",c); cpu[v]=c+0
        }
        END {
          for (v in icnt) {
            n=icnt[v]
            for (i=1;i<=n;i++) for (j=i+1;j<=n;j++)
              if (ivals[v,i]>ivals[v,j]) { tmp=ivals[v,i]; ivals[v,i]=ivals[v,j]; ivals[v,j]=tmp }
            med=ivals[v,int(n*0.50)+1]/1e6
            c=cpu[v]; eff=(c>0)?med/c:0
            printf "| %-8s | %15.1f | %17.1f | %14.2f |\n", v, med, c, eff
          }
        }' $D/throughput_iperf3.csv $D/container_stats.csv

        printf "\n---\n\n*Generated by ansible/bench.yml — cfwarp-cli*\n"
        } > $D/report.md && echo "OK: $D/report.md"
      register: _report
      changed_when: false

    - name: Fetch results to localhost
      ansible.builtin.fetch:
        src: "/tmp/bench-{{ bench_ts }}/{{ item }}"
        dest: "{{ playbook_dir }}/../bench-results/{{ item | regex_replace('(.*)\\.(.+)', '\\1_' + bench_ts + '.\\2') }}"
        flat: true
      loop:
        - latency.csv
        - throughput_iperf3.csv
        - throughput_http.csv
        - container_stats.csv
        - report.md

    - name: Print report
      ansible.builtin.shell: cat /tmp/bench-{{ bench_ts }}/report.md
      register: _rpt
      changed_when: false

    - name: Show report
      ansible.builtin.debug:
        msg: "{{ _rpt.stdout }}"


# ── Play 5: Teardown laxhd ────────────────────────────────────────────────────
- name: "5 · Teardown bench servers on laxhd"
  hosts: bench_server
  gather_facts: false
  tags: [teardown]

  tasks:
    - name: Remove bench containers
      ansible.builtin.shell: docker rm -f bench-iperf3 bench-nginx 2>/dev/null || true
      changed_when: false
