---
# dogfood-status.yml — inspect remote dogfood stack and related sing-box router
# without opening dashboards.
#
# Usage:
#   ansible-playbook -i ansible/inventory.ini ansible/dogfood-status.yml --limit <host> -e dogfood_hosts=<host>
#   # Pass dogfood_hosts when the target is not in [warp], e.g. <host>=laxhd.

- name: Inspect cfwarp dogfood stack
  hosts: "{{ dogfood_hosts | default('warp') }}"
  become: true
  gather_facts: false

  vars:
    compose_dir: /opt/cfwarp-dogfood
    compose_file: docker-compose.yml
    dogfood_backend_log_tail_lines: 40
    singbox_service_name: sing-box
    singbox_config_dir: /etc/sing-box
    singbox_outbounds_path: /etc/sing-box/outbounds.json
    singbox_routes_path: /etc/sing-box/routes.json
    singbox_rule_set_tag: geosite-google-deepmind
    singbox_rule_target_outbound: cfwarp-masque-local
    cfwarp_wireguard_port: 16080
    cfwarp_masque_port: 16081
    cfwarp_wireguard_state_dir: /home/cfwarp/.local/state/cfwarp-cli
    cfwarp_masque_state_dir: /home/cfwarp/.local/state/cfwarp-cli
    proxy_checks:
      - name: wireguard
        container_name: cfwarp-warp
        proxy_port: "{{ cfwarp_wireguard_port }}"
        state_dir: "{{ cfwarp_wireguard_state_dir }}"
      - name: masque
        container_name: cfwarp-masque
        proxy_port: "{{ cfwarp_masque_port }}"
        state_dir: "{{ cfwarp_masque_state_dir }}"

  tasks:
    - name: Show docker compose ps
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ compose_file }}"
          - ps
      args:
        chdir: "{{ compose_dir }}"
      register: compose_ps
      changed_when: false

    - name: Print compose ps
      ansible.builtin.debug:
        msg: "{{ compose_ps.stdout_lines }}"

    - name: Inspect container state and health
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - --format
          - "{{ '{{json .State}}' }}"
          - "{{ item.container_name }}"
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: inspect_state
      changed_when: false

    - name: Show container state and health
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} =>
          {{ item.stdout }}
      loop: "{{ inspect_state.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Show docker stats snapshot for proxy containers
      ansible.builtin.command:
        argv:
          - docker
          - stats
          - --no-stream
          - --format
          - "table {{ '{{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}' }}"
          - cfwarp-warp
          - cfwarp-masque
      register: docker_stats
      changed_when: false
      failed_when: false

    - name: Print docker stats snapshot
      ansible.builtin.debug:
        msg: "{{ docker_stats.stdout_lines | default([]) }}"

    - name: Capture cfwarp-cli status JSON inside each container
      ansible.builtin.shell: |
        set -euo pipefail
        timeout 10s docker exec {{ item.container_name | quote }} cfwarp-cli status --json --state-dir {{ item.state_dir | quote }}
      args:
        executable: /bin/bash
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: runtime_status
      changed_when: false
      failed_when: false

    - name: Print runtime status JSON
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} =>
          {{ item.stdout | default('') }}
          {{ item.stderr | default('') }}
      loop: "{{ runtime_status.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Show backend runtime state files when present
      ansible.builtin.shell: |
        set -euo pipefail
        docker exec {{ item.container_name | quote }} sh -lc 'state_dir={{ item.state_dir | quote }}; if [ -f "$state_dir/run/runtime.json" ]; then cat "$state_dir/run/runtime.json"; else echo no-runtime-json; fi'
      args:
        executable: /bin/bash
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: runtime_files
      changed_when: false
      failed_when: false

    - name: Print backend runtime state files
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} runtime.json =>
          {{ item.stdout | default('') }}
          {{ item.stderr | default('') }}
      loop: "{{ runtime_files.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Tail backend stderr logs from state dir
      ansible.builtin.shell: |
        set -euo pipefail
        docker exec {{ item.container_name | quote }} sh -lc 'state_dir={{ item.state_dir | quote }}; tail -n {{ dogfood_backend_log_tail_lines | int }} "$state_dir/logs/backend.stderr.log" 2>/dev/null || true'
      args:
        executable: /bin/bash
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: backend_stderr_logs
      changed_when: false
      failed_when: false

    - name: Print backend stderr logs
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} backend.stderr.log =>
          {{ item.stdout | default('') }}
          {{ item.stderr | default('') }}
      loop: "{{ backend_stderr_logs.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Tail recent container logs for each proxy
      ansible.builtin.command:
        argv:
          - docker
          - logs
          - --tail
          - "80"
          - "{{ item.container_name }}"
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: recent_logs
      changed_when: false
      failed_when: false

    - name: Print recent container logs
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} =>
          {{ item.stderr if item.stderr else item.stdout }}
      loop: "{{ recent_logs.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Query daemon status from each proxy container when available
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ item.container_name }}"
          - cfwarp-cli
          - daemon
          - ctl
          - status
          - --state-dir
          - "{{ item.state_dir }}"
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: daemon_status
      changed_when: false
      failed_when: false

    - name: Print daemon status
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} daemon =>
          {{ item.stdout | default('') }}
          {{ item.stderr | default('') }}
      loop: "{{ daemon_status.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Show sing-box service state
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - "{{ singbox_service_name }}"
      register: singbox_active
      changed_when: false
      failed_when: false

    - name: Print sing-box service state
      ansible.builtin.debug:
        msg: "{{ singbox_service_name }} => {{ singbox_active.stdout | default('unknown') }}"

    - name: Validate sing-box config syntax
      ansible.builtin.command:
        argv:
          - sing-box
          - check
          - -C
          - "{{ singbox_config_dir }}"
      register: singbox_check
      changed_when: false
      failed_when: false

    - name: Show managed sing-box outbounds fragment
      ansible.builtin.command:
        argv:
          - sed
          - -n
          - 1,240p
          - "{{ singbox_outbounds_path }}"
      register: singbox_outbounds
      changed_when: false
      failed_when: false

    - name: Print sing-box outbounds fragment
      ansible.builtin.debug:
        msg: "{{ singbox_outbounds.stdout_lines | default([]) }}"

    - name: Show managed sing-box routes fragment
      ansible.builtin.command:
        argv:
          - sed
          - -n
          - 1,240p
          - "{{ singbox_routes_path }}"
      register: singbox_routes
      changed_when: false
      failed_when: false

    - name: Print sing-box routes fragment
      ansible.builtin.debug:
        msg: "{{ singbox_routes.stdout_lines | default([]) }}"

    - name: Report DeepMind route status in managed fragments
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json

        def as_list(value):
            if value is None:
                return []
            if isinstance(value, str):
                return [value]
            if isinstance(value, list):
                return value
            return []

        try:
            with open("{{ singbox_routes_path }}", "r", encoding="utf-8") as f:
                route_doc = json.load(f)
            with open("{{ singbox_outbounds_path }}", "r", encoding="utf-8") as f:
                out_bounds = json.load(f)
        except FileNotFoundError:
            print("missing")
            raise SystemExit(2)

        route = route_doc.get("route", {})
        rule_sets = route.get("rule_set", [])
        rules = route.get("rules", [])

        rule_set_tag = {{ singbox_rule_set_tag | to_json }}
        target_outbound = {{ singbox_rule_target_outbound | to_json }}

        has_rule_set = any(
            isinstance(item, dict) and item.get("tag") == rule_set_tag
            for item in rule_sets
        )

        has_outbound = any(
            isinstance(rule, dict)
            and rule.get("action") == "route"
            and rule.get("outbound") == target_outbound
            and rule_set_tag in as_list(rule.get("rule_set"))
            for rule in rules
        )

        out_tags = {item.get("tag") for item in out_bounds.get("outbounds", []) if isinstance(item, dict)}
        has_outbounds = target_outbound in out_tags and len(out_tags) > 0

        if has_rule_set and has_outbound and has_outbounds:
            print("restored")
        else:
            print("missing")
            raise SystemExit(3)
        PY
      register: deepmind_route_check
      changed_when: false
      failed_when: false

    - name: Print DeepMind routing check result
      ansible.builtin.debug:
        msg: |-
          deepmind_route_check: {{ deepmind_route_check.stdout | default('missing') }}

    - name: Print sing-box config check output
      ansible.builtin.debug:
        msg: |
          rc={{ singbox_check.rc }}
          stdout={{ singbox_check.stdout | default('') }}
          stderr={{ singbox_check.stderr | default('') }}

    - name: Tail sing-box journal
      ansible.builtin.command:
        argv:
          - journalctl
          - -u
          - "{{ singbox_service_name }}"
          - -n
          - "80"
          - --no-pager
      register: singbox_journal
      changed_when: false
      failed_when: false

    - name: Print sing-box journal
      ansible.builtin.debug:
        msg: "{{ singbox_journal.stdout_lines | default([]) }}"
