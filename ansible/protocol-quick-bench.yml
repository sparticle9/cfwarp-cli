---
# protocol-quick-bench.yml — lightweight protocol comparison bench on remote hosts.
#
# Usage:
#   ansible-playbook -i inventory.ini ansible/protocol-quick-bench.yml --limit warp
#   ansible-playbook -i inventory.ini ansible/protocol-quick-bench.yml --limit warp \
#     -e cfwarp_image=ghcr.io/sparticle9/cfwarp-cli:feat-masque \
#     -e latency_runs=30 \
#     -e download_runs=5
#
# This is intentionally lighter than the benchmark harness in ansible/bench.yml.
# It compares the two WARP transport protocols through the same local SOCKS5 interface:
#   - wireguard
#   - masque
#
# Important: this is a practical proxy-path comparison, not a transport-pure microbenchmark.
# Both cases are exercised through SOCKS5 so the results include local proxy/runtime effects
# in addition to the underlying protocol behavior.

- name: Quick protocol comparison bench
  hosts: warp
  gather_facts: false

  vars:
    cfwarp_image: "ghcr.io/sparticle9/cfwarp-cli:feat-masque"
    image_revision_expected: ""
    bench_root: "/tmp/cfwarp-protocol-bench"
    bench_id: ""
    latency_runs: 20
    download_runs: 3
    download_bytes: 20000000
    startup_wait_seconds: 15
    retry_sleep_seconds: 3
    probe_timeout_seconds: 20
    udp_buffer_bytes: 0
    masque_use_ipv6: ""
    masque_connect_port: 0
    masque_mtu: 0
    masque_initial_packet_size: 0
    masque_keepalive_period_seconds: 0
    masque_reconnect_delay_millis: 0
    protocol_cases:
      - protocol: wireguard
        container_name: cfwarp-bench-wireguard
        host_port: 28120
        container_port: 1080
        startup_attempts: 1
        env:
          CFWARP_LISTEN_HOST: "0.0.0.0"
          CFWARP_LISTEN_PORT: "1080"
          CFWARP_PROXY_MODE: "socks5"
          CFWARP_LOG_LEVEL: "info"

      - protocol: masque
        container_name: cfwarp-bench-masque
        host_port: 28121
        container_port: 28081
        startup_attempts: 8
        env:
          CFWARP_RUNTIME_FAMILY: "native"
          CFWARP_TRANSPORT: "masque"
          CFWARP_MODE: "socks5"
          CFWARP_LISTEN_HOST: "0.0.0.0"
          CFWARP_LISTEN_PORT: "28081"
          CFWARP_LOG_LEVEL: "info"

  tasks:
    - name: Resolve bench id
      ansible.builtin.set_fact:
        bench_id_resolved: "{{ bench_id if (bench_id | length > 0) else lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"

    - name: Ensure bench root exists
      ansible.builtin.file:
        path: "{{ bench_root }}/{{ bench_id_resolved }}"
        state: directory
        mode: "0755"

    - name: Capture current UDP socket buffer sysctls
      ansible.builtin.shell: |
        set -euo pipefail
        printf 'rmem_max=%s\n' "$(cat /proc/sys/net/core/rmem_max)"
        printf 'wmem_max=%s\n' "$(cat /proc/sys/net/core/wmem_max)"
      args:
        executable: /bin/bash
      register: udp_buffer_sysctl_before
      changed_when: false
      when: udp_buffer_bytes | int > 0

    - name: Parse captured UDP socket buffer sysctls
      ansible.builtin.set_fact:
        udp_rmem_max_before: "{{ udp_buffer_sysctl_before.stdout | regex_search('rmem_max=(\\d+)', '\\1') | first }}"
        udp_wmem_max_before: "{{ udp_buffer_sysctl_before.stdout | regex_search('wmem_max=(\\d+)', '\\1') | first }}"
      when: udp_buffer_bytes | int > 0

    - name: Apply larger UDP socket buffer sysctls
      ansible.builtin.shell: |
        set -euo pipefail
        sudo sysctl -w net.core.rmem_max={{ udp_buffer_bytes | int }} net.core.wmem_max={{ udp_buffer_bytes | int }} >/dev/null
      args:
        executable: /bin/bash
      changed_when: true
      when: udp_buffer_bytes | int > 0

    - name: Pull packaged image under test
      ansible.builtin.command:
        cmd: docker pull {{ cfwarp_image }}
      register: docker_pull
      changed_when: "'Image is up to date' not in docker_pull.stdout"

    - name: Inspect packaged image labels
      ansible.builtin.command:
        cmd: docker image inspect {{ cfwarp_image }} --format {{ '"{{json .Config.Labels}}"' }}
      register: image_labels_raw
      changed_when: false

    - name: Parse packaged image labels
      ansible.builtin.set_fact:
        image_labels: "{{ image_labels_raw.stdout | from_json }}"

    - name: Assert packaged image revision when expected
      ansible.builtin.assert:
        that:
          - image_labels['org.opencontainers.image.revision'] | default('') == image_revision_expected
        fail_msg: >-
          expected image revision {{ image_revision_expected }}, got
          {{ image_labels['org.opencontainers.image.revision'] | default('unknown') }}
        success_msg: packaged image revision matches expected commit
      when: image_revision_expected | length > 0

    - name: Run quick bench case
      ansible.builtin.shell: |
        set -euo pipefail

        name={{ item.container_name | quote }}
        protocol={{ item.protocol | quote }}
        state_dir={{ (bench_root ~ '/' ~ bench_id_resolved ~ '/' ~ item.protocol ~ '-state') | quote }}
        result_json={{ (bench_root ~ '/' ~ bench_id_resolved ~ '/' ~ item.protocol ~ '.json') | quote }}
        host_port={{ item.host_port | quote }}
        container_port={{ item.container_port | quote }}
        startup_attempts={{ item.startup_attempts | int }}
        startup_wait={{ startup_wait_seconds | int }}
        retry_sleep={{ retry_sleep_seconds | int }}
        probe_timeout={{ probe_timeout_seconds | int }}
        latency_runs={{ latency_runs | int }}
        download_runs={{ download_runs | int }}
        download_bytes={{ download_bytes | int }}

        cleanup() {
          docker rm -f "$name" >/dev/null 2>&1 || true
        }

        trap cleanup EXIT

        rm -rf "$state_dir"
        mkdir -p "$state_dir"

        attempt=1
        while [ "$attempt" -le "$startup_attempts" ]; do
          echo "== ${protocol} / startup attempt ${attempt} =="
          cleanup
          rm -rf "$state_dir/run" "$state_dir/logs"
          mkdir -p "$state_dir"

          cid=$(docker run -d \
            --name "$name" \
            -p "127.0.0.1:${host_port}:${container_port}" \
            -v "$state_dir:/home/cfwarp/.local/state/cfwarp-cli" \
            {% for key, value in item.env.items() %}-e {{ key }}={{ value | quote }} \
            {% endfor %}{% if item.protocol == 'masque' and masque_use_ipv6 | string | length > 0 %}-e CFWARP_MASQUE_USE_IPV6={{ masque_use_ipv6 | quote }} \
            {% endif %}{% if item.protocol == 'masque' and masque_connect_port | int > 0 %}-e CFWARP_MASQUE_CONNECT_PORT={{ (masque_connect_port | int) | string | quote }} \
            {% endif %}{% if item.protocol == 'masque' and masque_mtu | int > 0 %}-e CFWARP_MASQUE_MTU={{ (masque_mtu | int) | string | quote }} \
            {% endif %}{% if item.protocol == 'masque' and masque_initial_packet_size | int > 0 %}-e CFWARP_MASQUE_INITIAL_PACKET_SIZE={{ (masque_initial_packet_size | int) | string | quote }} \
            {% endif %}{% if item.protocol == 'masque' and masque_keepalive_period_seconds | int > 0 %}-e CFWARP_MASQUE_KEEPALIVE_SECONDS={{ (masque_keepalive_period_seconds | int) | string | quote }} \
            {% endif %}{% if item.protocol == 'masque' and masque_reconnect_delay_millis | int > 0 %}-e CFWARP_MASQUE_RECONNECT_DELAY_MILLIS={{ (masque_reconnect_delay_millis | int) | string | quote }} \
            {% endif %}
            {{ cfwarp_image | quote }})
          echo "container=${cid}"
          sleep "$startup_wait"

          if curl -fsSL --max-time "$probe_timeout" --proxy "socks5h://127.0.0.1:${host_port}" https://www.cloudflare.com/cdn-cgi/trace | grep -q '^warp=on$'; then
            echo "${protocol} is ready"
            break
          fi

          echo "${protocol} failed attempt ${attempt}"
          docker logs "$name" || true
          if [ -f "$state_dir/logs/backend.stderr.log" ]; then
            echo "-- backend stderr --"
            cat "$state_dir/logs/backend.stderr.log"
          fi
          attempt=$((attempt + 1))
          if [ "$attempt" -le "$startup_attempts" ]; then
            sleep "$retry_sleep"
          fi
        done

        if [ "$attempt" -gt "$startup_attempts" ]; then
          echo "failed to start protocol ${protocol} after ${startup_attempts} attempts"
          exit 1
        fi

        tmp_latency=$(mktemp)
        tmp_download=$(mktemp)

        for _ in 1 2 3; do
          curl -fsSL --max-time 30 --proxy "socks5h://127.0.0.1:${host_port}" https://www.cloudflare.com/cdn-cgi/trace >/dev/null || true
        done

        i=1
        while [ "$i" -le "$latency_runs" ]; do
          curl -o /dev/null -sS --max-time 30 \
            --proxy "socks5h://127.0.0.1:${host_port}" \
            -w '%{time_total}\n' \
            "https://www.cloudflare.com/cdn-cgi/trace?run=${i}" >> "$tmp_latency"
          i=$((i + 1))
        done

        i=1
        while [ "$i" -le "$download_runs" ]; do
          curl -o /dev/null -sS --max-time 180 \
            --proxy "socks5h://127.0.0.1:${host_port}" \
            -w '%{time_total} %{speed_download}\n' \
            "https://speed.cloudflare.com/__down?bytes=${download_bytes}" >> "$tmp_download"
          i=$((i + 1))
        done

        stderr_log="$state_dir/logs/backend.stderr.log"
        runtime_json="$state_dir/run/runtime.json"
        if [ ! -f "$stderr_log" ]; then
          : > "$stderr_log"
        fi
        if [ ! -f "$runtime_json" ]; then
          : > "$runtime_json"
        fi

        python3 - "$tmp_latency" "$tmp_download" "$stderr_log" "$runtime_json" {{ item.protocol | quote }} "$attempt" > "$result_json" <<'PY'
        import json, pathlib, statistics, sys
        latency_path = pathlib.Path(sys.argv[1])
        download_path = pathlib.Path(sys.argv[2])
        stderr_path = pathlib.Path(sys.argv[3])
        runtime_path = pathlib.Path(sys.argv[4])
        protocol = sys.argv[5]
        startup_attempt_used = int(sys.argv[6])
        lat = [float(x.strip()) for x in latency_path.read_text().splitlines() if x.strip()]
        dls = []
        for line in download_path.read_text().splitlines():
            if not line.strip():
                continue
            t, s = line.split()
            dls.append((float(t), float(s)))
        lat_sorted = sorted(lat)
        idx95 = max(0, min(len(lat_sorted)-1, int(round(0.95 * len(lat_sorted))) - 1))
        stderr_lines = stderr_path.read_text().splitlines() if stderr_path.exists() else []
        endpoint_lines = [line for line in stderr_lines if 'type=endpoint_selected' in line]
        dial_metric_lines = [line for line in stderr_lines if 'type=dial_metrics' in line]
        retry_lines = [line for line in stderr_lines if 'type=retry' in line]
        runtime = {}
        if runtime_path.exists() and runtime_path.read_text().strip():
            runtime = json.loads(runtime_path.read_text())
        diagnostics = runtime.get('diagnostics') or {}
        out = {
            'protocol': protocol,
            'startup_attempt_used': startup_attempt_used,
            'latency_runs_s': lat,
            'latency_ms': {
                'min': round(min(lat) * 1000, 1),
                'median': round(statistics.median(lat) * 1000, 1),
                'mean': round(statistics.mean(lat) * 1000, 1),
                'p95': round(lat_sorted[idx95] * 1000, 1),
                'max': round(max(lat) * 1000, 1),
            },
            'download_runs': [
                {
                    'time_s': round(t, 3),
                    'speed_Bps': round(s, 1),
                    'speed_MiBps': round(s / 1024 / 1024, 2),
                }
                for t, s in dls
            ],
            'download_summary': {
                'mean_MiBps': round(statistics.mean([s / 1024 / 1024 for _, s in dls]), 2),
                'min_MiBps': round(min([s / 1024 / 1024 for _, s in dls]), 2),
                'max_MiBps': round(max([s / 1024 / 1024 for _, s in dls]), 2),
            },
            'transport_debug': {
                'endpoint_selected': endpoint_lines[-1] if endpoint_lines else '',
                'dial_metrics': dial_metric_lines[-1] if dial_metric_lines else '',
                'retry_count': len(retry_lines),
            },
            'runtime_debug': {
                'phase': runtime.get('phase', ''),
                'selected_endpoint': runtime.get('selected_endpoint', ''),
                'selected_address_family': runtime.get('selected_address_family', ''),
                'last_transport_error': runtime.get('last_transport_error', ''),
                'diagnostics': diagnostics,
            },
        }
        print(json.dumps(out, indent=2))
        PY

        rm -f "$tmp_latency" "$tmp_download"
        echo "wrote ${result_json}"
      args:
        executable: /bin/bash
      loop: "{{ protocol_cases }}"
      loop_control:
        label: "{{ item.protocol }}"
      changed_when: false

    - name: Build quick protocol comparison summary
      ansible.builtin.shell: |
        set -euo pipefail
        python3 - <<PY
        import json, pathlib
        base = pathlib.Path({{ (bench_root ~ '/' ~ bench_id_resolved) | to_json }})
        wireguard = json.loads((base / 'wireguard.json').read_text())
        masque = json.loads((base / 'masque.json').read_text())

        def pct_change(new, old):
            if old == 0:
                return None
            return round((new - old) / old * 100.0, 1)

        comparison = {
            'bench_id': {{ bench_id_resolved | to_json }},
            'image': {{ cfwarp_image | to_json }},
            'udp_buffer_bytes': {{ udp_buffer_bytes | int }},
            'masque_tuning': {
                'use_ipv6': {{ masque_use_ipv6 | to_json }},
                'connect_port': {{ masque_connect_port | int }},
                'mtu': {{ masque_mtu | int }},
                'initial_packet_size': {{ masque_initial_packet_size | int }},
                'keepalive_period_seconds': {{ masque_keepalive_period_seconds | int }},
                'reconnect_delay_millis': {{ masque_reconnect_delay_millis | int }},
            },
            'protocols': {
                'wireguard': wireguard,
                'masque': masque,
            },
            'comparison': {
                'latency_median_ms_delta': round(masque['latency_ms']['median'] - wireguard['latency_ms']['median'], 1),
                'latency_median_pct_vs_wireguard': pct_change(masque['latency_ms']['median'], wireguard['latency_ms']['median']),
                'latency_p95_ms_delta': round(masque['latency_ms']['p95'] - wireguard['latency_ms']['p95'], 1),
                'latency_p95_pct_vs_wireguard': pct_change(masque['latency_ms']['p95'], wireguard['latency_ms']['p95']),
                'download_mean_MiBps_delta': round(masque['download_summary']['mean_MiBps'] - wireguard['download_summary']['mean_MiBps'], 2),
                'download_mean_pct_vs_wireguard': pct_change(masque['download_summary']['mean_MiBps'], wireguard['download_summary']['mean_MiBps']),
            }
        }

        winner_notes = []
        if masque['latency_ms']['median'] < wireguard['latency_ms']['median']:
            winner_notes.append('masque has lower median latency')
        elif masque['latency_ms']['median'] > wireguard['latency_ms']['median']:
            winner_notes.append('wireguard has lower median latency')
        else:
            winner_notes.append('median latency is tied')

        if masque['download_summary']['mean_MiBps'] > wireguard['download_summary']['mean_MiBps']:
            winner_notes.append('masque has higher mean download throughput')
        elif masque['download_summary']['mean_MiBps'] < wireguard['download_summary']['mean_MiBps']:
            winner_notes.append('wireguard has higher mean download throughput')
        else:
            winner_notes.append('mean download throughput is tied')

        comparison['notes'] = winner_notes
        (base / 'comparison.json').write_text(json.dumps(comparison, indent=2) + '\n')
        lines = [
            f"bench_id={comparison['bench_id']}",
            f"udp_buffer_bytes={comparison['udp_buffer_bytes']}",
            f"masque_tuning={comparison['masque_tuning']}",
            f"wireguard: median={wireguard['latency_ms']['median']} ms, p95={wireguard['latency_ms']['p95']} ms, mean_dl={wireguard['download_summary']['mean_MiBps']} MiB/s",
            f"masque: median={masque['latency_ms']['median']} ms, p95={masque['latency_ms']['p95']} ms, mean_dl={masque['download_summary']['mean_MiBps']} MiB/s, startup_attempt={masque.get('startup_attempt_used')}, retries={masque.get('transport_debug', {}).get('retry_count')}, endpoint={masque.get('runtime_debug', {}).get('selected_endpoint')}, family={masque.get('runtime_debug', {}).get('selected_address_family')}",
            f"median latency delta (masque - wireguard): {comparison['comparison']['latency_median_ms_delta']} ms ({comparison['comparison']['latency_median_pct_vs_wireguard']}%)",
            f"p95 latency delta (masque - wireguard): {comparison['comparison']['latency_p95_ms_delta']} ms ({comparison['comparison']['latency_p95_pct_vs_wireguard']}%)",
            f"mean download delta (masque - wireguard): {comparison['comparison']['download_mean_MiBps_delta']} MiB/s ({comparison['comparison']['download_mean_pct_vs_wireguard']}%)",
        ] + comparison['notes']
        (base / 'comparison.txt').write_text('\n'.join(lines) + '\n')
        print('\n'.join(lines))
        PY
      args:
        executable: /bin/bash
      register: protocol_bench_summary
      changed_when: false

    - name: Show quick protocol bench summary
      ansible.builtin.debug:
        msg: "{{ protocol_bench_summary.stdout_lines }}"

    - name: Restore UDP socket buffer sysctls
      ansible.builtin.shell: |
        set -euo pipefail
        sudo sysctl -w net.core.rmem_max={{ udp_rmem_max_before }} net.core.wmem_max={{ udp_wmem_max_before }} >/dev/null
      args:
        executable: /bin/bash
      changed_when: true
      when: udp_buffer_bytes | int > 0
