---
# protocol-real-bench.yml — protocol/implementation comparison using real remote targets.
#
# Topology
#   warp hosts    run proxy implementations under test locally
#   bench_server  runs iperf3 + static HTTP targets on a separate remote host
#
# Usage
#   ansible-playbook -i inventory.ini ansible/protocol-real-bench.yml --limit warp
#   ansible-playbook -i inventory.ini ansible/protocol-real-bench.yml --limit warp \
#     -e cfwarp_image=ghcr.io/sparticle9/cfwarp-cli:perf-masque-tuning \
#     -e image_revision_expected=<git-sha> \
#     -e bench_id=protocol-real
#
#   Example tuned MASQUE run:
#     ansible-playbook -i inventory.ini ansible/protocol-real-bench.yml --limit warp \
#       -e cfwarp_image=ghcr.io/sparticle9/cfwarp-cli:perf-masque-tuning \
#       -e bench_id=protocol-real-tuned \
#       -e udp_buffer_bytes=7500000 \
#       -e masque_connect_port=443 \
#       -e masque_mtu=1280 \
#       -e masque_initial_packet_size=1242 \
#       -e masque_keepalive_period_seconds=25 \
#       -e masque_reconnect_delay_millis=1200
#
# Notes
#   - keeps the lightweight curl/trace-style quick bench separate
#   - adds remote iperf3 + static HTTP download tests through local proxy implementations
#   - includes vanilla usque from upstream release binaries, without replacing existing cfwarp cases
#   - exposes MASQUE tuning knobs so the real-target bench can be reused for performance iteration

- name: Setup remote protocol benchmark targets
  hosts: bench_server
  gather_facts: false
  vars:
    nginx_file_mb: 256
  tasks:
    - name: Inspect existing iperf3 container
      ansible.builtin.shell: docker inspect -f '{{ "{{.State.Status}}" }}' protocol-real-iperf3 2>/dev/null || true
      register: iperf3_status
      changed_when: false

    - name: Inspect existing nginx container
      ansible.builtin.shell: docker inspect -f '{{ "{{.State.Status}}" }}' protocol-real-nginx 2>/dev/null || true
      register: nginx_status
      changed_when: false

    - name: Reuse existing iperf3 port if container is already running
      ansible.builtin.shell: |
        docker inspect protocol-real-iperf3 | python3 -c "import json,sys; data=json.load(sys.stdin)[0]; print(data['NetworkSettings']['Ports']['5201/tcp'][0]['HostPort'])"
      register: iperf3_port_existing
      changed_when: false
      when: (iperf3_status.stdout | trim) == 'running'

    - name: Reuse existing nginx port if container is already running
      ansible.builtin.shell: |
        docker inspect protocol-real-nginx | python3 -c "import json,sys; data=json.load(sys.stdin)[0]; print(data['NetworkSettings']['Ports']['80/tcp'][0]['HostPort'])"
      register: nginx_port_existing
      changed_when: false
      when: (nginx_status.stdout | trim) == 'running'

    - name: Find free port for iperf3 if not already running
      ansible.builtin.shell: |
        port=15251
        while ss -tlnH "( sport = :${port} )" 2>/dev/null | grep -q .; do port=$((port+1)); done
        echo "$port"
      register: iperf3_port_new
      changed_when: false
      when: (iperf3_status.stdout | trim) != 'running'

    - name: Find free port for nginx if not already running
      ansible.builtin.shell: |
        taken={{ (iperf3_port_new.stdout | trim) if (iperf3_port_new is defined and iperf3_port_new.stdout is defined) else '15251' }}
        port=$(( 18180 > taken ? 18180 : taken + 1 ))
        while ss -tlnH "( sport = :${port} )" 2>/dev/null | grep -q .; do port=$((port+1)); done
        echo "$port"
      register: nginx_port_new
      changed_when: false
      when: (nginx_status.stdout | trim) != 'running'

    - name: Remove stale non-running protocol benchmark containers
      ansible.builtin.shell: |
        [ "{{ iperf3_status.stdout | trim }}" = "running" ] || docker rm -f protocol-real-iperf3 2>/dev/null || true
        [ "{{ nginx_status.stdout | trim }}" = "running" ] || docker rm -f protocol-real-nginx 2>/dev/null || true
      changed_when: false

    - name: Start iperf3 server if needed
      ansible.builtin.shell: |
        docker run -d --name protocol-real-iperf3 \
          -p "{{ iperf3_port_new.stdout | trim }}:5201/tcp" \
          --restart no networkstatic/iperf3 -s
      when: (iperf3_status.stdout | trim) != 'running'

    - name: Start nginx static file server if needed
      ansible.builtin.shell: |
        docker run -d --name protocol-real-nginx \
          -p "{{ nginx_port_new.stdout | trim }}:80" \
          --restart no \
          --tmpfs /bench:rw,size={{ nginx_file_mb }}m \
          nginx:alpine sh -c '
            dd if=/dev/urandom of=/bench/data.bin bs=1M count={{ nginx_file_mb }} 2>/dev/null
            cat > /etc/nginx/conf.d/bench.conf <<EOF
        server {
            listen 80; sendfile on;
            location /data.bin { alias /bench/data.bin; }
            location /204      { return 204; }
        }
        EOF
            rm -f /etc/nginx/conf.d/default.conf
            nginx -g "daemon off;"
          '
      when: (nginx_status.stdout | trim) != 'running'

    - name: Store remote target ports as host facts
      ansible.builtin.set_fact:
        protocol_real_iperf3_port: "{{ (iperf3_port_existing.stdout | trim) if (iperf3_port_existing is defined and iperf3_port_existing.stdout is defined and (iperf3_port_existing.stdout | trim) != '') else (iperf3_port_new.stdout | trim) }}"
        protocol_real_http_port: "{{ (nginx_port_existing.stdout | trim) if (nginx_port_existing is defined and nginx_port_existing.stdout is defined and (nginx_port_existing.stdout | trim) != '') else (nginx_port_new.stdout | trim) }}"

    - name: Wait for remote iperf3 port
      ansible.builtin.wait_for:
        port: "{{ protocol_real_iperf3_port }}"
        timeout: 30

    - name: Wait for remote HTTP port
      ansible.builtin.wait_for:
        port: "{{ protocol_real_http_port }}"
        timeout: 120

    - name: Show remote target ports
      ansible.builtin.debug:
        msg: "protocol-real target iperf3={{ protocol_real_iperf3_port }} http={{ protocol_real_http_port }}"

- name: Real protocol comparison bench
  hosts: warp
  gather_facts: false
  vars:
    bench_root: "/tmp/cfwarp-protocol-real-bench"
    bench_id: ""
    cfwarp_image: "ghcr.io/sparticle9/cfwarp-cli:perf-masque-tuning"
    image_revision_expected: ""
    helper_image: "cfwarp-protocol-bench-helper:latest"
    usque_version: "v1.4.2"
    usque_asset: "usque_1.4.2_linux_amd64.zip"
    usque_download_url: "https://github.com/Diniboy1123/usque/releases/download/v1.4.2/usque_1.4.2_linux_amd64.zip"
    startup_wait_seconds: 15
    retry_sleep_seconds: 3
    probe_timeout_seconds: 20
    udp_buffer_bytes: 0
    masque_endpoint_override: ""
    masque_sni: ""
    masque_use_ipv6: ""
    masque_connect_port: 0
    masque_mtu: 0
    masque_initial_packet_size: 0
    masque_keepalive_period_seconds: 0
    masque_reconnect_delay_millis: 0
    latency_runs: 5
    iperf3_runs: 1
    iperf3_duration: 10
    iperf3_parallel: 2
    http_runs: 1
    protocol_cases:
      - name: wireguard
        kind: cfwarp
        proxy_port: 1080
        startup_attempts: 3
        env:
          CFWARP_RUNTIME_FAMILY: legacy
          CFWARP_TRANSPORT: wireguard
          CFWARP_PROXY_MODE: socks5
          CFWARP_LISTEN_HOST: 0.0.0.0
          CFWARP_LISTEN_PORT: "1080"
      - name: masque
        kind: cfwarp
        proxy_port: 1081
        startup_attempts: 5
        env:
          CFWARP_RUNTIME_FAMILY: native
          CFWARP_TRANSPORT: masque
          CFWARP_PROXY_MODE: socks5
          CFWARP_LISTEN_HOST: 0.0.0.0
          CFWARP_LISTEN_PORT: "1080"
      - name: usque
        kind: usque
        proxy_port: 1082
        startup_attempts: 3
        env: {}
  tasks:
    - name: Resolve bench id
      ansible.builtin.set_fact:
        bench_id_resolved: "{{ bench_id if (bench_id | length > 0) else lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"

    - name: Ensure bench root exists
      ansible.builtin.file:
        path: "{{ bench_root }}/{{ bench_id_resolved }}"
        state: directory
        mode: "0755"

    - name: Resolve remote benchmark target host
      ansible.builtin.set_fact:
        protocol_real_target_host: >-
          {{ hostvars[groups['bench_server'][0]].get(
            'ansible_host',
            lookup('pipe', 'ssh -G ' ~ groups['bench_server'][0] ~ " | awk '/^hostname /{print $2}'")
          ) }}
        protocol_real_target_iperf3_port: "{{ hostvars[groups['bench_server'][0]].get('protocol_real_iperf3_port', '15251') }}"
        protocol_real_target_http_port: "{{ hostvars[groups['bench_server'][0]].get('protocol_real_http_port', '18180') }}"

    - name: Capture current UDP socket buffer sysctls
      ansible.builtin.shell: |
        set -euo pipefail
        printf 'rmem_max=%s\n' "$(cat /proc/sys/net/core/rmem_max)"
        printf 'wmem_max=%s\n' "$(cat /proc/sys/net/core/wmem_max)"
      args:
        executable: /bin/bash
      register: udp_buffer_sysctl_before
      changed_when: false
      when: udp_buffer_bytes | int > 0

    - name: Parse captured UDP socket buffer sysctls
      ansible.builtin.set_fact:
        udp_rmem_max_before: "{{ udp_buffer_sysctl_before.stdout | regex_search('rmem_max=(\\d+)', '\\1') | first }}"
        udp_wmem_max_before: "{{ udp_buffer_sysctl_before.stdout | regex_search('wmem_max=(\\d+)', '\\1') | first }}"
      when: udp_buffer_bytes | int > 0

    - name: Apply larger UDP socket buffer sysctls
      ansible.builtin.shell: |
        set -euo pipefail
        sudo sysctl -w net.core.rmem_max={{ udp_buffer_bytes | int }} net.core.wmem_max={{ udp_buffer_bytes | int }} >/dev/null
      args:
        executable: /bin/bash
      changed_when: true
      when: udp_buffer_bytes | int > 0

    - name: Pull packaged image under test
      ansible.builtin.command:
        cmd: docker pull {{ cfwarp_image }}
      register: docker_pull
      changed_when: "'Image is up to date' not in docker_pull.stdout"

    - name: Inspect packaged image labels
      ansible.builtin.shell: |
        docker image inspect {{ cfwarp_image | quote }} | python3 -c 'import json,sys; data=json.load(sys.stdin)[0]; print(json.dumps((data.get("Config") or {}).get("Labels") or {}))'
      args:
        executable: /bin/bash
      register: image_inspect
      changed_when: false

    - name: Parse packaged image labels
      ansible.builtin.set_fact:
        image_labels: "{{ image_inspect.stdout | from_json }}"

    - name: Assert packaged image revision when expected
      ansible.builtin.assert:
        that:
          - image_labels['org.opencontainers.image.revision'] | default('') == image_revision_expected
        fail_msg: >-
          expected image revision {{ image_revision_expected }}, got
          {{ image_labels['org.opencontainers.image.revision'] | default('unknown') }}
        success_msg: packaged image revision matches expected commit
      when: image_revision_expected | length > 0

    - name: Build or refresh helper image for proxy-based real tests
      ansible.builtin.shell: |
        set -euo pipefail
        helper_dir="{{ bench_root }}/helper-image"
        mkdir -p "$helper_dir"
        cat > "$helper_dir/Dockerfile" <<'EOF'
        FROM alpine:3.22
        RUN apk add --no-cache bash curl iperf3 proxychains-ng python3
        ENTRYPOINT ["/bin/sh", "-lc"]
        EOF
        docker build -t {{ helper_image | quote }} "$helper_dir" >/dev/null
      args:
        executable: /bin/bash
      changed_when: false

    - name: Download vanilla usque release binary when missing
      ansible.builtin.shell: |
        set -euo pipefail
        tools_dir="{{ bench_root }}/tools/usque/{{ usque_version }}"
        zip_path="$tools_dir/{{ usque_asset }}"
        bin_path="$tools_dir/usque"
        mkdir -p "$tools_dir"
        if [ ! -x "$bin_path" ]; then
          curl -fsSL {{ usque_download_url | quote }} -o "$zip_path"
          python3 - "$zip_path" "$tools_dir" <<'PY'
        import pathlib, sys, zipfile
        zip_path = pathlib.Path(sys.argv[1])
        out_dir = pathlib.Path(sys.argv[2])
        with zipfile.ZipFile(zip_path) as zf:
            zf.extractall(out_dir)
        PY
          chmod +x "$bin_path"
        fi
        printf '%s\n' "$bin_path"
      args:
        executable: /bin/bash
      register: usque_bin_path
      changed_when: false

    - name: Run real protocol bench case
      ansible.builtin.shell: |
        set -euo pipefail

        case_name={{ item.name | quote }}
        kind={{ item.kind | quote }}
        proxy_port={{ item.proxy_port | int }}
        startup_attempts={{ item.startup_attempts | int }}
        startup_wait={{ startup_wait_seconds | int }}
        retry_sleep={{ retry_sleep_seconds | int }}
        probe_timeout={{ probe_timeout_seconds | int }}
        latency_runs={{ latency_runs | int }}
        iperf3_runs={{ iperf3_runs | int }}
        iperf3_duration={{ iperf3_duration | int }}
        iperf3_parallel={{ iperf3_parallel | int }}
        http_runs={{ http_runs | int }}
        helper_image={{ helper_image | quote }}
        cfwarp_image={{ cfwarp_image | quote }}
        usque_bin={{ usque_bin_path.stdout | trim | quote }}
        target_host={{ protocol_real_target_host | quote }}
        target_iperf3_port={{ protocol_real_target_iperf3_port | quote }}
        target_http_port={{ protocol_real_target_http_port | quote }}

        base_dir={{ (bench_root ~ '/' ~ bench_id_resolved) | quote }}
        case_dir="$base_dir/$case_name"
        result_json="$base_dir/$case_name.json"
        mkdir -p "$case_dir"

        pidfile="$case_dir/process.pid"
        stdout_log="$case_dir/stdout.log"
        stderr_log="$case_dir/stderr.log"
        runtime_json="$case_dir/runtime.json"
        state_dir="$case_dir/state"
        usque_config="$state_dir/config.json"

        cleanup() {
          docker rm -f "protocol-real-${case_name}" >/dev/null 2>&1 || true
          if [ -f "$pidfile" ]; then
            pid=$(cat "$pidfile" 2>/dev/null || true)
            if [ -n "${pid:-}" ]; then
              kill "$pid" >/dev/null 2>&1 || true
              wait "$pid" >/dev/null 2>&1 || true
            fi
            rm -f "$pidfile"
          fi
        }

        trap cleanup EXIT

        rm -rf "$case_dir"
        mkdir -p "$case_dir" "$state_dir"

        write_proxychains_config() {
          cat > "$case_dir/proxychains.conf" <<EOF
        strict_chain
        proxy_dns
        [ProxyList]
        socks5 127.0.0.1 ${proxy_port}
        EOF
        }

        start_case() {
          : > "$stdout_log"
          : > "$stderr_log"
          : > "$runtime_json"
          if [ "$kind" = "cfwarp" ]; then
            docker run -d \
              --name "protocol-real-${case_name}" \
              -p "127.0.0.1:${proxy_port}:1080" \
              -v "$state_dir:/home/cfwarp/.local/state/cfwarp-cli" \
              {% for key, value in item.env.items() %}-e {{ key }}={{ value | quote }} \
              {% endfor %}{% if item.name == 'masque' and masque_endpoint_override | string | length > 0 %}-e CFWARP_ENDPOINT_OVERRIDE={{ masque_endpoint_override | quote }} \
              {% endif %}{% if item.name == 'masque' and masque_sni | string | length > 0 %}-e CFWARP_MASQUE_SNI={{ masque_sni | quote }} \
              {% endif %}{% if item.name == 'masque' and masque_use_ipv6 | string | length > 0 %}-e CFWARP_MASQUE_USE_IPV6={{ masque_use_ipv6 | quote }} \
              {% endif %}{% if item.name == 'masque' and masque_connect_port | int > 0 %}-e CFWARP_MASQUE_CONNECT_PORT={{ (masque_connect_port | int) | string | quote }} \
              {% endif %}{% if item.name == 'masque' and masque_mtu | int > 0 %}-e CFWARP_MASQUE_MTU={{ (masque_mtu | int) | string | quote }} \
              {% endif %}{% if item.name == 'masque' and masque_initial_packet_size | int > 0 %}-e CFWARP_MASQUE_INITIAL_PACKET_SIZE={{ (masque_initial_packet_size | int) | string | quote }} \
              {% endif %}{% if item.name == 'masque' and masque_keepalive_period_seconds | int > 0 %}-e CFWARP_MASQUE_KEEPALIVE_SECONDS={{ (masque_keepalive_period_seconds | int) | string | quote }} \
              {% endif %}{% if item.name == 'masque' and masque_reconnect_delay_millis | int > 0 %}-e CFWARP_MASQUE_RECONNECT_DELAY_MILLIS={{ (masque_reconnect_delay_millis | int) | string | quote }} \
              {% endif %}
              "$cfwarp_image" >/dev/null
            stdout_log="$state_dir/logs/backend.stdout.log"
            stderr_log="$state_dir/logs/backend.stderr.log"
            runtime_json="$state_dir/run/runtime.json"
          else
            if [ ! -f "$usque_config" ]; then
              "$usque_bin" register -a -c "$usque_config" >"$case_dir/register.stdout.log" 2>"$case_dir/register.stderr.log"
            fi
            nohup "$usque_bin" -c "$usque_config" socks -b 127.0.0.1 -p "$proxy_port" >"$stdout_log" 2>"$stderr_log" &
            echo $! > "$pidfile"
          fi
        }

        attempt=1
        while [ "$attempt" -le "$startup_attempts" ]; do
          echo "== ${case_name} / startup attempt ${attempt} =="
          cleanup
          rm -rf "$case_dir"
          mkdir -p "$case_dir" "$state_dir"
          stdout_log="$case_dir/stdout.log"
          stderr_log="$case_dir/stderr.log"
          runtime_json="$case_dir/runtime.json"
          start_case
          sleep "$startup_wait"

          if curl -fsSL --max-time "$probe_timeout" --proxy "socks5h://127.0.0.1:${proxy_port}" https://www.cloudflare.com/cdn-cgi/trace | grep -q '^warp=on$'; then
            echo "${case_name} is ready"
            break
          fi

          echo "${case_name} failed attempt ${attempt}"
          if [ -f "$stdout_log" ]; then
            echo "-- stdout --"
            tail -n 50 "$stdout_log" || true
          fi
          if [ -f "$stderr_log" ]; then
            echo "-- stderr --"
            tail -n 100 "$stderr_log" || true
          fi
          attempt=$((attempt + 1))
          if [ "$attempt" -le "$startup_attempts" ]; then
            sleep "$retry_sleep"
          fi
        done

        if [ "$attempt" -gt "$startup_attempts" ]; then
          echo "failed to start case ${case_name} after ${startup_attempts} attempts"
          exit 1
        fi

        write_proxychains_config

        tmp_latency="$case_dir/latency.txt"
        tmp_iperf="$case_dir/iperf3.ndjson"
        tmp_http="$case_dir/http.txt"
        : > "$tmp_latency"
        : > "$tmp_iperf"
        : > "$tmp_http"

        for _ in 1 2 3; do
          curl -fsSL --max-time 30 --proxy "socks5h://127.0.0.1:${proxy_port}" https://www.cloudflare.com/cdn-cgi/trace >/dev/null || true
        done

        i=1
        while [ "$i" -le "$latency_runs" ]; do
          docker run --rm --network host "$helper_image" \
            "curl -o /dev/null -sS --max-time 30 --proxy socks5h://127.0.0.1:${proxy_port} -w '%{time_total}\\n' https://www.cloudflare.com/cdn-cgi/trace?run=${i}" >> "$tmp_latency"
          i=$((i + 1))
        done

        i=1
        while [ "$i" -le "$iperf3_runs" ]; do
          docker run --rm --network host -v "$case_dir:/work" "$helper_image" \
            "proxychains4 -q -f /work/proxychains.conf iperf3 -c ${target_host} -p ${target_iperf3_port} -t ${iperf3_duration} -P ${iperf3_parallel} --bidir --json || proxychains -q -f /work/proxychains.conf iperf3 -c ${target_host} -p ${target_iperf3_port} -t ${iperf3_duration} -P ${iperf3_parallel} --bidir --json" >> "$tmp_iperf"
          i=$((i + 1))
        done

        i=1
        while [ "$i" -le "$http_runs" ]; do
          docker run --rm --network host "$helper_image" \
            "curl -o /dev/null -sS --max-time 300 --proxy socks5h://127.0.0.1:${proxy_port} -w '%{time_total} %{size_download} %{speed_download} %{http_code}\\n' http://${target_host}:${target_http_port}/data.bin" >> "$tmp_http"
          i=$((i + 1))
        done

        if [ ! -f "$stderr_log" ]; then
          : > "$stderr_log"
        fi
        if [ ! -f "$runtime_json" ]; then
          : > "$runtime_json"
        fi

        python3 - "$tmp_latency" "$tmp_iperf" "$tmp_http" "$stderr_log" "$runtime_json" "$case_name" "$kind" "$attempt" > "$result_json" <<'PY'
        import json, pathlib, statistics, sys

        latency_path = pathlib.Path(sys.argv[1])
        iperf_path = pathlib.Path(sys.argv[2])
        http_path = pathlib.Path(sys.argv[3])
        stderr_path = pathlib.Path(sys.argv[4])
        runtime_path = pathlib.Path(sys.argv[5])
        case_name = sys.argv[6]
        kind = sys.argv[7]
        startup_attempt_used = int(sys.argv[8])

        def pct(values):
            values = sorted(values)
            idx = max(0, min(len(values) - 1, int(round(0.95 * len(values))) - 1))
            return values[idx]

        def parse_json_stream(text):
            decoder = json.JSONDecoder()
            idx = 0
            items = []
            length = len(text)
            while idx < length:
                while idx < length and text[idx].isspace():
                    idx += 1
                if idx >= length:
                    break
                payload, next_idx = decoder.raw_decode(text, idx)
                items.append(payload)
                idx = next_idx
            return items

        lat = [float(x.strip()) for x in latency_path.read_text().splitlines() if x.strip()]
        iperf_runs = []
        for payload in parse_json_stream(iperf_path.read_text()):
            end = payload.get('end', {})
            sent = end.get('sum_sent', {}) or {}
            recv = end.get('sum_received', {}) or {}
            iperf_runs.append({
                'upload_Mbps': round(float(sent.get('bits_per_second', 0)) / 1_000_000, 2),
                'download_Mbps': round(float(recv.get('bits_per_second', 0)) / 1_000_000, 2),
                'upload_retransmits': int(sent.get('retransmits', 0) or 0),
                'download_retransmits': int(recv.get('retransmits', 0) or 0),
            })
        http_runs = []
        for line in http_path.read_text().splitlines():
            if not line.strip():
                continue
            t, size, speed, code = line.split()
            http_runs.append({
                'time_s': round(float(t), 3),
                'size_bytes': int(float(size)),
                'speed_Bps': round(float(speed), 1),
                'speed_MiBps': round(float(speed) / 1024 / 1024, 2),
                'http_code': int(code),
            })

        stderr_lines = stderr_path.read_text().splitlines() if stderr_path.exists() else []
        runtime = {}
        if runtime_path.exists() and runtime_path.read_text().strip():
            runtime = json.loads(runtime_path.read_text())

        endpoint_lines = [line for line in stderr_lines if 'type=endpoint_selected' in line]
        dial_metric_lines = [line for line in stderr_lines if 'type=dial_metrics' in line]
        retry_lines = [line for line in stderr_lines if 'type=retry' in line]

        out = {
            'case': case_name,
            'kind': kind,
            'startup_attempt_used': startup_attempt_used,
            'latency_runs_s': lat,
            'latency_ms': {
                'min': round(min(lat) * 1000, 1),
                'median': round(statistics.median(lat) * 1000, 1),
                'mean': round(statistics.mean(lat) * 1000, 1),
                'p95': round(pct(lat) * 1000, 1),
                'max': round(max(lat) * 1000, 1),
            },
            'iperf3_runs': iperf_runs,
            'iperf3_summary': {
                'upload_mean_Mbps': round(statistics.mean([r['upload_Mbps'] for r in iperf_runs]), 2) if iperf_runs else 0,
                'download_mean_Mbps': round(statistics.mean([r['download_Mbps'] for r in iperf_runs]), 2) if iperf_runs else 0,
            },
            'http_runs': http_runs,
            'http_summary': {
                'mean_MiBps': round(statistics.mean([r['speed_MiBps'] for r in http_runs]), 2) if http_runs else 0,
                'min_MiBps': round(min([r['speed_MiBps'] for r in http_runs]), 2) if http_runs else 0,
                'max_MiBps': round(max([r['speed_MiBps'] for r in http_runs]), 2) if http_runs else 0,
            },
            'transport_debug': {
                'endpoint_selected': endpoint_lines[-1] if endpoint_lines else '',
                'dial_metrics': dial_metric_lines[-1] if dial_metric_lines else '',
                'retry_count': len(retry_lines),
            },
            'runtime_debug': {
                'phase': runtime.get('phase', ''),
                'selected_endpoint': runtime.get('selected_endpoint', ''),
                'selected_address_family': runtime.get('selected_address_family', ''),
                'last_transport_error': runtime.get('last_transport_error', ''),
                'diagnostics': runtime.get('diagnostics') or {},
            },
        }
        print(json.dumps(out, indent=2))
        PY

        echo "wrote ${result_json}"
      args:
        executable: /bin/bash
      loop: "{{ protocol_cases }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    - name: Build real protocol comparison summary
      ansible.builtin.shell: |
        set -euo pipefail
        python3 - <<PY
        import json, pathlib
        base = pathlib.Path({{ (bench_root ~ '/' ~ bench_id_resolved) | to_json }})
        results = {}
        for path in sorted(base.glob('*.json')):
            if path.name == 'comparison.json':
                continue
            payload = json.loads(path.read_text())
            results[payload['case']] = payload

        cases = sorted(results)
        comparison = {
            'bench_id': {{ bench_id_resolved | to_json }},
            'image': {{ cfwarp_image | to_json }},
            'udp_buffer_bytes': {{ udp_buffer_bytes | int }},
            'masque_tuning': {
                'endpoint_override': {{ masque_endpoint_override | to_json }},
                'sni': {{ masque_sni | to_json }},
                'use_ipv6': {{ masque_use_ipv6 | to_json }},
                'connect_port': {{ masque_connect_port | int }},
                'mtu': {{ masque_mtu | int }},
                'initial_packet_size': {{ masque_initial_packet_size | int }},
                'keepalive_period_seconds': {{ masque_keepalive_period_seconds | int }},
                'reconnect_delay_millis': {{ masque_reconnect_delay_millis | int }},
            },
            'target_host': {{ protocol_real_target_host | to_json }},
            'target_iperf3_port': {{ protocol_real_target_iperf3_port | to_json }},
            'target_http_port': {{ protocol_real_target_http_port | to_json }},
            'cases': results,
        }
        (base / 'comparison.json').write_text(json.dumps(comparison, indent=2) + '\n')

        lines = [
            f"bench_id={comparison['bench_id']}",
            f"udp_buffer_bytes={comparison['udp_buffer_bytes']}",
            f"masque_tuning={comparison['masque_tuning']}",
            f"target={comparison['target_host']} iperf3_port={comparison['target_iperf3_port']} http_port={comparison['target_http_port']}",
        ]
        for case in cases:
            payload = results[case]
            lines.append(
                f"{case}: latency median={payload['latency_ms']['median']} ms p95={payload['latency_ms']['p95']} ms | "
                f"iperf up/down={payload['iperf3_summary']['upload_mean_Mbps']}/{payload['iperf3_summary']['download_mean_Mbps']} Mbps | "
                f"http mean={payload['http_summary']['mean_MiBps']} MiB/s | "
                f"startup_attempt={payload['startup_attempt_used']} retries={payload.get('transport_debug', {}).get('retry_count')}"
            )
        if cases:
            latency_winner = min(cases, key=lambda c: results[c]['latency_ms']['median'])
            upload_winner = max(cases, key=lambda c: results[c]['iperf3_summary']['upload_mean_Mbps'])
            download_winner = max(cases, key=lambda c: results[c]['iperf3_summary']['download_mean_Mbps'])
            http_winner = max(cases, key=lambda c: results[c]['http_summary']['mean_MiBps'])
            lines.append(f"best latency: {latency_winner}")
            lines.append(f"best iperf3 upload: {upload_winner}")
            lines.append(f"best iperf3 download: {download_winner}")
            lines.append(f"best HTTP download: {http_winner}")
        (base / 'comparison.txt').write_text('\n'.join(lines) + '\n')
        print('\n'.join(lines))
        PY
      args:
        executable: /bin/bash
      register: protocol_real_summary
      changed_when: false

    - name: Show real protocol bench summary
      ansible.builtin.debug:
        msg: "{{ protocol_real_summary.stdout_lines }}"

    - name: Restore UDP socket buffer sysctls
      ansible.builtin.shell: |
        set -euo pipefail
        sudo sysctl -w net.core.rmem_max={{ udp_rmem_max_before }} net.core.wmem_max={{ udp_wmem_max_before }} >/dev/null
      args:
        executable: /bin/bash
      changed_when: true
      when: udp_buffer_bytes | int > 0
