---
# tasks/bench_variant.yml — measurements for one warp variant.
# Expects: variant.name, variant.image, variant.run_cmd, variant.startup_marker
# Expects on host: bench_ts, bench_ip, iperf3_port, nginx_port,
#                  runs_lat, runs_thr, iperf3_duration, iperf3_parallel,
#                  container_cpus, container_memory, tunnel_wait_sec, state_volume

- name: "[{{ variant.name }}] Remove previous bench container if any"
  ansible.builtin.shell: docker rm -f cfwarp-bench-{{ variant.name }} 2>/dev/null || true
  changed_when: false

- name: "[{{ variant.name }}] Start benchmark container"
  ansible.builtin.shell: |
    {{ variant.run_cmd }}

- name: "[{{ variant.name }}] Wait for WireGuard tunnel (ping through shared netns)"
  ansible.builtin.shell: >-
    docker run --rm
    --network container:cfwarp-bench-{{ variant.name }}
    alpine ping -c1 -W3 {{ bench_ip }} >/dev/null 2>&1
  register: _tunnel
  retries: "{{ (tunnel_wait_sec | int // 3) }}"
  delay: 3
  until: _tunnel.rc == 0
  changed_when: false

- name: "[{{ variant.name }}] Verify container still running"
  ansible.builtin.shell: docker inspect cfwarp-bench-{{ variant.name }} --format '{{ "{{.State.Status}}" }}'
  register: _cstate
  changed_when: false
  failed_when: _cstate.stdout | trim != 'running'

- name: "[{{ variant.name }}] Capture startup logs"
  ansible.builtin.shell: docker logs --tail 50 cfwarp-bench-{{ variant.name }} 2>&1 || true
  register: _startup_logs
  changed_when: false

- name: "[{{ variant.name }}] Assert startup marker detected"
  ansible.builtin.assert:
    that:
      - "variant.startup_marker in (_startup_logs.stdout | default(''))"
    fail_msg: "startup marker not found for {{ variant.name }}"

- name: "[{{ variant.name }}] Warmup — 5 pings to stabilise WireGuard session"
  ansible.builtin.shell: >-
    docker run --rm
    --network container:cfwarp-bench-{{ variant.name }}
    alpine ping -c5 -W3 {{ bench_ip }} >/dev/null 2>&1
  changed_when: false
  failed_when: false

# ── Latency ───────────────────────────────────────────────────────────────────
- name: "[{{ variant.name }}] Latency phase"
  block:
    - name: "[{{ variant.name }}] Start latency docker stats sampler"
      ansible.builtin.shell: |
        pidfile=/tmp/bench-{{ bench_ts }}/{{ variant.name }}-latency-sampler.pid
        statefile=/tmp/docker-stats-cfwarp-bench-{{ variant.name }}-latency.state
        rm -f "$pidfile" "$statefile"
        nohup sh -c 'while :; do /tmp/docker_stats.sh "{{ variant.name }}" latency cfwarp-bench-{{ variant.name }} /tmp/bench-{{ bench_ts }}/container_stats.csv; sleep 1; done' >/dev/null 2>&1 &
        echo $! > "$pidfile"
      changed_when: false

    - name: "[{{ variant.name }}] Latency — {{ runs_lat }} pings through WireGuard"
      ansible.builtin.shell: |
        docker run --rm \
          --network container:cfwarp-bench-{{ variant.name }} \
          alpine sh -c '
            for i in $(seq 1 {{ runs_lat }}); do
              rtt=$(ping -c1 -W5 {{ bench_ip }} 2>/dev/null \
                    | grep "time=" | sed "s/.*time=//;s/ ms//")
              echo "{{ variant.name }},${i},${rtt:-ERR}"
            done
          '
      register: _lat
      changed_when: false

    - name: "[{{ variant.name }}] Append latency rows to CSV"
      ansible.builtin.shell: |
        printf '%s\n' {{ _lat.stdout_lines | map('quote') | join(' ') }} \
          >> /tmp/bench-{{ bench_ts }}/latency.csv
      changed_when: false
  always:
    - name: "[{{ variant.name }}] Stop latency docker stats sampler"
      ansible.builtin.shell: |
        pidfile=/tmp/bench-{{ bench_ts }}/{{ variant.name }}-latency-sampler.pid
        if [ -f "$pidfile" ]; then
          pid=$(cat "$pidfile")
          kill "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true
          rm -f "$pidfile"
        fi
      changed_when: false
      failed_when: false

# ── iperf3 throughput ─────────────────────────────────────────────────────────
- name: "[{{ variant.name }}] Verify container running before iperf3"
  ansible.builtin.shell: docker inspect cfwarp-bench-{{ variant.name }} --format '{{ "{{.State.Status}}" }}'
  register: _cstate_iperf
  changed_when: false
  failed_when: _cstate_iperf.stdout | trim != 'running'

- name: "[{{ variant.name }}] iperf3 preflight"
  ansible.builtin.shell: |
    docker run --rm \
      --network container:cfwarp-bench-{{ variant.name }} \
      networkstatic/iperf3 \
      -c {{ bench_ip }} -p {{ iperf3_port }} \
      -t 3 -P 1 >/dev/null
  changed_when: false

- name: "[{{ variant.name }}] iperf3 throughput phase"
  block:
    - name: "[{{ variant.name }}] Start iperf3 docker stats sampler"
      ansible.builtin.shell: |
        pidfile=/tmp/bench-{{ bench_ts }}/{{ variant.name }}-iperf3-sampler.pid
        statefile=/tmp/docker-stats-cfwarp-bench-{{ variant.name }}-iperf3.state
        rm -f "$pidfile" "$statefile"
        nohup sh -c 'while :; do /tmp/docker_stats.sh "{{ variant.name }}" iperf3 cfwarp-bench-{{ variant.name }} /tmp/bench-{{ bench_ts }}/container_stats.csv; sleep 1; done' >/dev/null 2>&1 &
        echo $! > "$pidfile"
      changed_when: false

    - name: "[{{ variant.name }}] iperf3 bidirectional runs"
      ansible.builtin.shell: |
        tmp=/tmp/bench-{{ bench_ts }}/iperf3_{{ variant.name }}_{{ _run_n }}.json
        docker run --rm \
          --network container:cfwarp-bench-{{ variant.name }} \
          networkstatic/iperf3 \
          -c {{ bench_ip }} -p {{ iperf3_port }} \
          -t {{ iperf3_duration }} -P {{ iperf3_parallel }} \
          --bidir --json > "$tmp"
        python3 - "$tmp" <<'PY'
        import json, sys
        p = sys.argv[1]
        with open(p) as f:
            data = json.load(f)
        end = data.get('end', {})
        sent = end.get('sum_sent', {}) or {}
        recv = end.get('sum_received', {}) or {}
        print('{{ variant.name }},{{ _run_n }},upload,{:.6f},{}'.format(float(sent.get('bits_per_second', 0)), int(sent.get('retransmits', 0))))
        print('{{ variant.name }},{{ _run_n }},download,{:.6f},{}'.format(float(recv.get('bits_per_second', 0)), int(recv.get('retransmits', 0) or 0)))
        PY
      register: _iperf3
      loop: "{{ range(1, runs_thr | int + 1) | list }}"
      loop_control:
        loop_var: _run_n
        label: "run {{ _run_n }}/{{ runs_thr }}"
      changed_when: false
      failed_when: false

    - name: "[{{ variant.name }}] Append iperf3 rows to CSV"
      ansible.builtin.shell: |
        {% for r in _iperf3.results %}
        if [ -n "{{ r.stdout | default('') }}" ]; then
          printf '%s\n' {{ r.stdout_lines | map('quote') | join(' ') }} >> /tmp/bench-{{ bench_ts }}/throughput_iperf3.csv
        else
          echo "{{ variant.name }},{{ r._run_n }},upload,ERR,0" >> /tmp/bench-{{ bench_ts }}/throughput_iperf3.csv
          echo "{{ variant.name }},{{ r._run_n }},download,ERR,0" >> /tmp/bench-{{ bench_ts }}/throughput_iperf3.csv
        fi
        {% endfor %}
      changed_when: false

    - name: "[{{ variant.name }}] Assert iperf3 succeeded for all runs"
      ansible.builtin.assert:
        that:
          - "(_iperf3.results | selectattr('stdout', 'defined') | selectattr('stdout', 'match', '.+') | list | length) == (runs_thr | int)"
        fail_msg: "iperf3 bidirectional benchmark did not complete successfully for all runs"
  rescue:
    - name: "[{{ variant.name }}] Dump cfwarp logs after iperf3 failure"
      ansible.builtin.shell: docker logs --tail 200 cfwarp-bench-{{ variant.name }} 2>&1 || true
      register: _iperf3_logs
      changed_when: false
      failed_when: false

    - name: "[{{ variant.name }}] Show iperf3 failure logs"
      ansible.builtin.debug:
        msg: "{{ _iperf3_logs.stdout }}"

    - name: "[{{ variant.name }}] Fail iperf3 phase"
      ansible.builtin.fail:
        msg: "iperf3 phase failed for {{ variant.name }}"
  always:
    - name: "[{{ variant.name }}] Stop iperf3 docker stats sampler"
      ansible.builtin.shell: |
        pidfile=/tmp/bench-{{ bench_ts }}/{{ variant.name }}-iperf3-sampler.pid
        if [ -f "$pidfile" ]; then
          pid=$(cat "$pidfile")
          kill "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true
          rm -f "$pidfile"
        fi
      changed_when: false
      failed_when: false

# ── HTTP bulk download ────────────────────────────────────────────────────────
- name: "[{{ variant.name }}] Verify container running before HTTP"
  ansible.builtin.shell: docker inspect cfwarp-bench-{{ variant.name }} --format '{{ "{{.State.Status}}" }}'
  register: _cstate_http
  changed_when: false
  failed_when: _cstate_http.stdout | trim != 'running'

- name: "[{{ variant.name }}] HTTP preflight"
  ansible.builtin.shell: |
    code=$(docker run --rm \
      --network container:cfwarp-bench-{{ variant.name }} \
      curlimages/curl -sS -o /dev/null -w '%{http_code}' \
      http://{{ bench_ip }}:{{ nginx_port }}/204)
    test "$code" = "204"
  changed_when: false

- name: "[{{ variant.name }}] HTTP throughput phase"
  block:
    - name: "[{{ variant.name }}] Start HTTP docker stats sampler"
      ansible.builtin.shell: |
        pidfile=/tmp/bench-{{ bench_ts }}/{{ variant.name }}-http-sampler.pid
        statefile=/tmp/docker-stats-cfwarp-bench-{{ variant.name }}-http.state
        rm -f "$pidfile" "$statefile"
        nohup sh -c 'while :; do /tmp/docker_stats.sh "{{ variant.name }}" http cfwarp-bench-{{ variant.name }} /tmp/bench-{{ bench_ts }}/container_stats.csv; sleep 1; done' >/dev/null 2>&1 &
        echo $! > "$pidfile"
      changed_when: false

    - name: "[{{ variant.name }}] HTTP download runs"
      ansible.builtin.shell: |
        docker run --rm \
          --network container:cfwarp-bench-{{ variant.name }} \
          curlimages/curl \
          -sS -o /dev/null --max-time 300 \
          --write-out "{{ variant.name }},{{ _run_n }},%{time_total},%{size_download},%{speed_download},%{http_code}" \
          "http://{{ bench_ip }}:{{ nginx_port }}/data.bin"
      register: _http
      loop: "{{ range(1, runs_thr | int + 1) | list }}"
      loop_control:
        loop_var: _run_n
        label: "run {{ _run_n }}/{{ runs_thr }}"
      changed_when: false
      failed_when: false

    - name: "[{{ variant.name }}] Append HTTP rows to CSV"
      ansible.builtin.shell: |
        {% for r in _http.results %}
        if [ -n "{{ r.stdout | default('') }}" ]; then
          echo "{{ r.stdout }}" >> /tmp/bench-{{ bench_ts }}/throughput_http.csv
        else
          echo "{{ variant.name }},{{ r._run_n }},ERR,0,0,0" >> /tmp/bench-{{ bench_ts }}/throughput_http.csv
        fi
        {% endfor %}
      changed_when: false

    - name: "[{{ variant.name }}] Assert HTTP succeeded for all runs"
      ansible.builtin.assert:
        that:
          - "(_http.results | selectattr('stdout', 'defined') | selectattr('stdout', 'search', ',200$') | list | length) == (runs_thr | int)"
        fail_msg: "HTTP benchmark did not complete successfully for all runs"
  rescue:
    - name: "[{{ variant.name }}] Dump cfwarp logs after HTTP failure"
      ansible.builtin.shell: docker logs --tail 200 cfwarp-bench-{{ variant.name }} 2>&1 || true
      register: _http_logs
      changed_when: false
      failed_when: false

    - name: "[{{ variant.name }}] Show HTTP failure logs"
      ansible.builtin.debug:
        msg: "{{ _http_logs.stdout }}"

    - name: "[{{ variant.name }}] Fail HTTP phase"
      ansible.builtin.fail:
        msg: "HTTP phase failed for {{ variant.name }}"
  always:
    - name: "[{{ variant.name }}] Stop HTTP docker stats sampler"
      ansible.builtin.shell: |
        pidfile=/tmp/bench-{{ bench_ts }}/{{ variant.name }}-http-sampler.pid
        if [ -f "$pidfile" ]; then
          pid=$(cat "$pidfile")
          kill "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true
          rm -f "$pidfile"
        fi
      changed_when: false
      failed_when: false

# ── Cleanup ───────────────────────────────────────────────────────────────────
- name: "[{{ variant.name }}] Stop cfwarp container"
  ansible.builtin.shell: docker rm -f cfwarp-bench-{{ variant.name }} 2>/dev/null || true
  changed_when: false

- name: "[{{ variant.name }}] Cool-down before next variant"
  ansible.builtin.pause:
    seconds: 5
