---
- name: Deploy cfwarp-cli on WARP proxy hosts
  hosts: warp
  become: true

  vars:
    image: "ghcr.io/sparticle9/cfwarp-cli:main"
    pull_image: true
    container_name: cfwarp
    proxy_port: "18080"
    data_volume: cfwarp-data
    compose_dir: /opt/cfwarp-cli
    state_dir: /home/cfwarp/.local/state/cfwarp-cli

  tasks:
    - name: Ensure compose directory exists
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        mode: "0750"

    - name: Write docker-compose.yml
      ansible.builtin.copy:
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: "0640"
        content: |
          services:
            cfwarp:
              image: {{ image }}
              container_name: {{ container_name }}
              restart: unless-stopped
              ports:
                - "127.0.0.1:{{ proxy_port }}:1080"
              environment:
                CFWARP_LISTEN_HOST: "0.0.0.0"
                CFWARP_LISTEN_PORT: "1080"
                CFWARP_PROXY_MODE: "socks5"
                CFWARP_LOG_LEVEL: "info"
                CFWARP_STATE_DIR: "{{ state_dir }}"
              volumes:
                - {{ data_volume }}:{{ state_dir }}
          volumes:
            {{ data_volume }}:

    - name: Pull latest image
      community.docker.docker_image:
        name: "{{ image }}"
        source: pull
        force_source: true
      when: pull_image | bool

    - name: Deploy with docker compose (up -d)
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        pull: "{{ 'always' if pull_image | bool else 'never' }}"
        state: present

    - name: Wait for proxy port to accept connections (up to 90s)
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ proxy_port }}"
        timeout: 90
        delay: 5

    - name: Verify proxy is reachable via curl + socks5h
      ansible.builtin.command:
        cmd: >
          curl -fsSL --max-time 15
          --proxy socks5h://127.0.0.1:{{ proxy_port }}
          https://www.cloudflare.com/cdn-cgi/trace
      register: trace_output
      changed_when: false

    - name: Show cdn-cgi/trace output
      ansible.builtin.debug:
        msg: "{{ trace_output.stdout_lines }}"

    - name: Assert warp=on in trace response
      ansible.builtin.assert:
        that: "'warp=on' in trace_output.stdout"
        fail_msg: "warp=on not found — proxy may not be routing through WARP"
        success_msg: "warp=on confirmed ✓"
