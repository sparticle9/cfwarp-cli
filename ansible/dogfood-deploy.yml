---
# dogfood-deploy.yml — deploy stable WireGuard/WARP and experimental MASQUE
# SOCKS proxies side-by-side on a remote Docker host, then wire the local
# sing-box router to use them for selected rule-sets.
#
# Usage:
#   ansible-playbook -i inventory.ini ansible/dogfood-deploy.yml --limit <host>
#
# Notes:
#   - Both proxies bind only to 127.0.0.1 on the remote host.
#   - Both protocol lanes use the same published cfwarp image; behavior differs
#     only by runtime env/config.
#   - Default local ports are 16080 (WireGuard) and 16081 (MASQUE).
#   - Default router rule sends geosite-google-deepmind to the MASQUE outbound,
#     keeping the blast radius narrow while exercising the experimental lane.
#   - For targets outside the [warp] group (for example laxhd), set
#     `-e dogfood_hosts=<host-or-group>` so the merge/restart logic runs there.

- name: Deploy cfwarp dogfood stack and sing-box routing
  hosts: "{{ dogfood_hosts | default('warp') }}"
  become: true
  gather_facts: false

  vars:
    compose_dir: /opt/cfwarp-dogfood
    compose_file: docker-compose.yml
    env_file: .env
    cfwarp_image: ghcr.io/sparticle9/cfwarp-cli:latest
    cfwarp_wireguard_port: 16080
    cfwarp_masque_port: 16081
    cfwarp_wireguard_state_dir: /home/cfwarp/.local/state/cfwarp-cli
    cfwarp_masque_state_dir: /home/cfwarp/.local/state/cfwarp-cli
    cfwarp_wireguard_data_dir: "{{ compose_dir }}/state/wireguard"
    cfwarp_masque_data_dir: "{{ compose_dir }}/state/masque"
    cfwarp_log_level: info
    cfwarp_masque_sni: ""
    cfwarp_masque_use_ipv6: ""
    cfwarp_masque_connect_port: 443
    cfwarp_masque_mtu: 1280
    cfwarp_masque_initial_packet_size: 1242
    cfwarp_masque_keepalive_seconds: 25
    cfwarp_masque_reconnect_delay_millis: 1200
    cfwarp_wireguard_caps_checks: []
    cfwarp_wireguard_caps_interval_seconds: 300
    cfwarp_wireguard_rotation_enabled: false
    cfwarp_wireguard_rotation_max_attempts_per_incident: 3
    cfwarp_wireguard_rotation_settle_time_seconds: 12
    cfwarp_wireguard_rotation_cooldown_seconds: 1800
    cfwarp_wireguard_rotation_restore_last_good: true
    cfwarp_masque_caps_checks: []
    cfwarp_masque_caps_interval_seconds: 300
    cfwarp_masque_rotation_enabled: false
    cfwarp_masque_rotation_max_attempts_per_incident: 3
    cfwarp_masque_rotation_settle_time_seconds: 12
    cfwarp_masque_rotation_cooldown_seconds: 1800
    cfwarp_masque_rotation_restore_last_good: true

    singbox_manage_router: true
    singbox_config_dir: /etc/sing-box
    singbox_outbounds_path: /etc/sing-box/outbounds.json
    singbox_routes_path: /etc/sing-box/routes.json
    singbox_service_name: sing-box
    singbox_managed_dir: /usr/local/lib/cfwarp-dogfood
    singbox_merge_script_path: /usr/local/lib/cfwarp-dogfood/merge_singbox_fragments.py
    singbox_outbounds_candidate: /usr/local/lib/cfwarp-dogfood/outbounds.json.candidate
    singbox_routes_candidate: /usr/local/lib/cfwarp-dogfood/routes.json.candidate
    singbox_validation_dir: /usr/local/lib/cfwarp-dogfood/validation-dir
    singbox_warp_outbound_tag: cfwarp-warp-local
    singbox_masque_outbound_tag: cfwarp-masque-local
    singbox_rule_set_tag: geosite-google-deepmind
    singbox_rule_set_url: https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-google-deepmind.srs
    singbox_rule_target_outbound: cfwarp-masque-local

    proxy_checks:
      - name: wireguard
        container_name: cfwarp-warp
        proxy_port: "{{ cfwarp_wireguard_port }}"
        state_dir: "{{ cfwarp_wireguard_state_dir }}"
      - name: masque
        container_name: cfwarp-masque
        proxy_port: "{{ cfwarp_masque_port }}"
        state_dir: "{{ cfwarp_masque_state_dir }}"

  handlers:
    - name: reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: restart sing-box
      ansible.builtin.systemd_service:
        name: "{{ singbox_service_name }}"
        state: restarted
        enabled: true

  tasks:
    - name: Ensure compose directory exists
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        mode: "0750"

    - name: Ensure managed helper and state directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ singbox_managed_dir }}", mode: "0755", owner: "root", group: "root" }
        - { path: "{{ cfwarp_wireguard_data_dir }}", mode: "0755", owner: "1000", group: "1000" }
        - { path: "{{ cfwarp_masque_data_dir }}", mode: "0755", owner: "1000", group: "1000" }

    - name: Copy dogfood compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../deploy/docker-compose.dogfood.yml"
        dest: "{{ compose_dir }}/{{ compose_file }}"
        mode: "0640"

    - name: Write dogfood env file
      ansible.builtin.copy:
        dest: "{{ compose_dir }}/{{ env_file }}"
        mode: "0640"
        content: |
          CFWARP_IMAGE={{ cfwarp_image }}
          CFWARP_WIREGUARD_PORT={{ cfwarp_wireguard_port }}
          CFWARP_MASQUE_PORT={{ cfwarp_masque_port }}
          CFWARP_WIREGUARD_STATE_DIR={{ cfwarp_wireguard_state_dir }}
          CFWARP_MASQUE_STATE_DIR={{ cfwarp_masque_state_dir }}
          CFWARP_WIREGUARD_DATA_DIR={{ cfwarp_wireguard_data_dir }}
          CFWARP_MASQUE_DATA_DIR={{ cfwarp_masque_data_dir }}

    - name: Write WireGuard daemon settings file
      ansible.builtin.copy:
        dest: "{{ cfwarp_wireguard_data_dir }}/settings.json"
        owner: "1000"
        group: "1000"
        mode: "0600"
        content: |
          {{ {
            'runtime_family': 'legacy',
            'transport': 'wireguard',
            'log_level': cfwarp_log_level,
            'access': [
              {
                'type': 'socks5',
                'listen_host': '0.0.0.0',
                'listen_port': 1080
              }
            ],
            'caps': {
              'interval_seconds': cfwarp_wireguard_caps_interval_seconds,
              'checks': cfwarp_wireguard_caps_checks | map('regex_replace', '^(.*)$', '{"probe":"\\1","required":false,"rotate_on_fail":true,"timeout_seconds":15}') | map('from_json') | list
            },
            'rotation': {
              'enabled': cfwarp_wireguard_rotation_enabled,
              'max_attempts_per_incident': cfwarp_wireguard_rotation_max_attempts_per_incident,
              'settle_time_seconds': cfwarp_wireguard_rotation_settle_time_seconds,
              'cooldown_seconds': cfwarp_wireguard_rotation_cooldown_seconds,
              'restore_last_good': cfwarp_wireguard_rotation_restore_last_good,
              'enroll_masque': false
            }
          } | to_nice_json }}

    - name: Write MASQUE daemon settings file
      ansible.builtin.copy:
        dest: "{{ cfwarp_masque_data_dir }}/settings.json"
        owner: "1000"
        group: "1000"
        mode: "0600"
        content: |
          {{ {
            'runtime_family': 'native',
            'transport': 'masque',
            'log_level': cfwarp_log_level,
            'masque_options': {
              'sni': cfwarp_masque_sni,
              'connect_port': cfwarp_masque_connect_port,
              'use_ipv6': (cfwarp_masque_use_ipv6 | string | lower) in ['1','true','yes','on'],
              'mtu': cfwarp_masque_mtu,
              'initial_packet_size': cfwarp_masque_initial_packet_size,
              'keepalive_period_seconds': cfwarp_masque_keepalive_seconds,
              'reconnect_delay_millis': cfwarp_masque_reconnect_delay_millis
            },
            'access': [
              {
                'type': 'socks5',
                'listen_host': '0.0.0.0',
                'listen_port': 1080
              }
            ],
            'caps': {
              'interval_seconds': cfwarp_masque_caps_interval_seconds,
              'checks': cfwarp_masque_caps_checks | map('regex_replace', '^(.*)$', '{"probe":"\\1","required":false,"rotate_on_fail":true,"timeout_seconds":15}') | map('from_json') | list
            },
            'rotation': {
              'enabled': cfwarp_masque_rotation_enabled,
              'max_attempts_per_incident': cfwarp_masque_rotation_max_attempts_per_incident,
              'settle_time_seconds': cfwarp_masque_rotation_settle_time_seconds,
              'cooldown_seconds': cfwarp_masque_rotation_cooldown_seconds,
              'restore_last_good': cfwarp_masque_rotation_restore_last_good,
              'enroll_masque': true
            }
          } | to_nice_json }}

    - name: Clear stale runtime directories from bind-mounted state
      ansible.builtin.file:
        path: "{{ item }}/run"
        state: absent
      loop:
        - "{{ cfwarp_wireguard_data_dir }}"
        - "{{ cfwarp_masque_data_dir }}"

    - name: Remove incompatible MASQUE account state when MASQUE enrollment is missing
      ansible.builtin.shell: |
        set -uo pipefail
        account_file={{ (cfwarp_masque_data_dir ~ '/account.json') | quote }}
        if [ ! -f "$account_file" ]; then
          exit 0
        fi
        has_masque=$(python3 - <<'PY' "$account_file"
        import json, sys
        path = sys.argv[1]
        with open(path) as f:
            data = json.load(f)
        print('yes' if data.get('masque') else 'no')
        PY
        )
        if [ "$has_masque" = "no" ]; then
          rm -f "$account_file"
          echo removed
        fi
      args:
        executable: /bin/bash
      register: masque_account_cleanup
      changed_when: "'removed' in (masque_account_cleanup.stdout | default(''))"

    - name: Pull dogfood images
      ansible.builtin.command:
        argv:
          - docker
          - pull
          - "{{ item }}"
      loop:
        - "{{ cfwarp_image }}"
      changed_when: false

    - name: Start dogfood compose stack
      ansible.builtin.shell: >-
        docker compose
        --env-file {{ env_file | quote }}
        -f {{ compose_file | quote }}
        up -d
      args:
        chdir: "{{ compose_dir }}"
        executable: /bin/bash
      changed_when: false

    - name: Wait for localhost-bound proxy ports
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ item }}"
        timeout: 120
        delay: 5
      loop:
        - "{{ cfwarp_wireguard_port }}"
        - "{{ cfwarp_masque_port }}"

    - name: Capture runtime status JSON from each proxy container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ item.container_name }}"
          - cfwarp-cli
          - status
          - --json
          - --state-dir
          - "{{ item.state_dir }}"
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: proxy_status_json
      changed_when: false
      failed_when: false

    - name: Show runtime status JSON
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} =>
          {{ item.stdout | default('') }}
          {{ item.stderr | default('') }}
      loop: "{{ proxy_status_json.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Query daemon status from each proxy container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ item.container_name }}"
          - cfwarp-cli
          - daemon
          - ctl
          - status
          - --state-dir
          - "{{ item.state_dir }}"
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: proxy_daemon_status
      changed_when: false
      failed_when: false

    - name: Show daemon status JSON
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} daemon =>
          {{ item.stdout | default('') }}
          {{ item.stderr | default('') }}
      loop: "{{ proxy_daemon_status.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Check sing-box fragment files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ singbox_outbounds_path }}"
        - "{{ singbox_routes_path }}"
      register: singbox_fragment_stats
      when: singbox_manage_router | bool

    - name: Fail when sing-box fragment files are missing
      ansible.builtin.assert:
        that:
          - (singbox_fragment_stats.results | map(attribute='stat.exists') | min)
        fail_msg: >-
          sing-box fragment files are missing under {{ singbox_config_dir }}; refusing automatic router mutation.
        success_msg: sing-box fragment files found
      when: singbox_manage_router | bool

    - name: Install sing-box merge helper
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/merge_singbox_fragments.py"
        dest: "{{ singbox_merge_script_path }}"
        owner: root
        group: root
        mode: "0755"
      when: singbox_manage_router | bool

    - name: Render candidate sing-box outbounds/routes with cfwarp entries and DeepMind rule-set
      ansible.builtin.command:
        argv:
          - python3
          - "{{ singbox_merge_script_path }}"
          - --outbounds
          - "{{ singbox_outbounds_path }}"
          - --routes
          - "{{ singbox_routes_path }}"
          - --warp-port
          - "{{ cfwarp_wireguard_port | string }}"
          - --masque-port
          - "{{ cfwarp_masque_port | string }}"
          - --warp-tag
          - "{{ singbox_warp_outbound_tag }}"
          - --masque-tag
          - "{{ singbox_masque_outbound_tag }}"
          - --rule-set-tag
          - "{{ singbox_rule_set_tag }}"
          - --rule-set-url
          - "{{ singbox_rule_set_url }}"
          - --rule-target-outbound
          - "{{ singbox_rule_target_outbound }}"
          - --outbounds-output
          - "{{ singbox_outbounds_candidate }}"
          - --routes-output
          - "{{ singbox_routes_candidate }}"
      changed_when: false
      when: singbox_manage_router | bool

    - name: Validate rendered candidates contain DeepMind routing wiring
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json

        def as_list(value):
            if value is None:
                return []
            if isinstance(value, str):
                return [value]
            if isinstance(value, list):
                return value
            return []

        out_bounds = json.loads(open("{{ singbox_outbounds_candidate }}", "r", encoding="utf-8").read())
        out_route = json.loads(open("{{ singbox_routes_candidate }}", "r", encoding="utf-8").read())

        expected_outbounds = {
            "warp": {{ singbox_warp_outbound_tag | to_json }},
            "masque": {{ singbox_masque_outbound_tag | to_json }},
        }

        available_tags = {
            item.get("tag")
            for item in out_bounds.get("outbounds", [])
            if isinstance(item, dict) and item.get("tag")
        }

        missing = [
            name for name, tag in expected_outbounds.items() if tag and tag not in available_tags
        ]
        if missing:
            raise SystemExit("missing expected outbounds for rendered candidates: %s" % ", ".join(missing))

        route_doc = out_route.get("route", {})
        rule_sets = route_doc.get("rule_set", [])
        if not any(isinstance(item, dict) and item.get("tag") == {{ singbox_rule_set_tag | to_json }} for item in rule_sets):
            raise SystemExit("missing expected rule set tag: {{ singbox_rule_set_tag }}")

        rules = route_doc.get("rules", [])
        target_outbound = {{ singbox_rule_target_outbound | to_json }}
        managed_tag = {{ singbox_rule_set_tag | to_json }}
        if not any(
            isinstance(rule, dict)
            and rule.get("action") == "route"
            and rule.get("outbound") == target_outbound
            and managed_tag in as_list(rule.get("rule_set"))
            for rule in rules
        ):
            raise SystemExit(
                "missing managed DeepMind route: tag=%s outbound=%s" % (managed_tag, target_outbound)
            )
        PY
      changed_when: false
      when: singbox_manage_router | bool

    - name: Prepare temporary sing-box validation directory
      ansible.builtin.file:
        path: "{{ singbox_validation_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: singbox_manage_router | bool

    - name: Copy sing-box directory into validation directory
      ansible.builtin.shell: |
        set -euo pipefail
        rm -rf {{ singbox_validation_dir | quote }}/*
        cp -a {{ singbox_config_dir | quote }}/. {{ singbox_validation_dir | quote }}/
        cp {{ singbox_outbounds_candidate | quote }} {{ singbox_validation_dir | quote }}/outbounds.json
        cp {{ singbox_routes_candidate | quote }} {{ singbox_validation_dir | quote }}/routes.json
      args:
        executable: /bin/bash
      changed_when: false
      when: singbox_manage_router | bool

    - name: Validate merged sing-box config directory
      ansible.builtin.command:
        argv:
          - sing-box
          - check
          - -C
          - "{{ singbox_validation_dir }}"
      changed_when: false
      when: singbox_manage_router | bool

    - name: Install managed sing-box outbounds fragment
      ansible.builtin.copy:
        src: "{{ singbox_outbounds_candidate }}"
        dest: "{{ singbox_outbounds_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
        backup: true
      notify: restart sing-box
      when: singbox_manage_router | bool

    - name: Install managed sing-box routes fragment
      ansible.builtin.copy:
        src: "{{ singbox_routes_candidate }}"
        dest: "{{ singbox_routes_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
        backup: true
      notify: restart sing-box
      when: singbox_manage_router | bool

    - name: Verify installed sing-box route wiring for geosite-google-deepmind
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json

        def as_list(value):
            if value is None:
                return []
            if isinstance(value, str):
                return [value]
            if isinstance(value, list):
                return value
            return []

        with open("{{ singbox_outbounds_path }}", "r", encoding="utf-8") as f:
            out_bounds = json.load(f)
        with open("{{ singbox_routes_path }}", "r", encoding="utf-8") as f:
            out_route = json.load(f)

        expected_outbounds = {
            "warp": {{ singbox_warp_outbound_tag | to_json }},
            "masque": {{ singbox_masque_outbound_tag | to_json }},
        }

        available_tags = {
            item.get("tag")
            for item in out_bounds.get("outbounds", [])
            if isinstance(item, dict) and item.get("tag")
        }

        missing = [
            name for name, tag in expected_outbounds.items() if tag and tag not in available_tags
        ]
        if missing:
            raise SystemExit("missing expected outbounds after install: %s" % ", ".join(missing))

        route_doc = out_route.get("route", {})
        rule_sets = route_doc.get("rule_set", [])
        if not any(isinstance(item, dict) and item.get("tag") == {{ singbox_rule_set_tag | to_json }} for item in rule_sets):
            raise SystemExit("missing expected rule set tag: {{ singbox_rule_set_tag }}")

        target_outbound = {{ singbox_rule_target_outbound | to_json }}
        managed_tag = {{ singbox_rule_set_tag | to_json }}
        rules = route_doc.get("rules", [])
        if not any(
            isinstance(rule, dict)
            and rule.get("action") == "route"
            and rule.get("outbound") == target_outbound
            and managed_tag in as_list(rule.get("rule_set"))
            for rule in rules
        ):
            raise SystemExit(
                "missing managed DeepMind route after install: tag=%s outbound=%s" % (managed_tag, target_outbound)
            )
        PY
      changed_when: false
      when: singbox_manage_router | bool

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Stop and disable legacy observer timer if present
      ansible.builtin.systemd_service:
        name: cfwarp-dogfood-observer.timer
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop legacy observer service if present
      ansible.builtin.systemd_service:
        name: cfwarp-dogfood-observer.service
        state: stopped
      failed_when: false

    - name: Remove legacy observer script
      ansible.builtin.file:
        path: /usr/local/bin/cfwarp-dogfood-observer
        state: absent

    - name: Remove legacy observer service unit
      ansible.builtin.file:
        path: /etc/systemd/system/cfwarp-dogfood-observer.service
        state: absent
      notify: reload systemd

    - name: Remove legacy observer timer unit
      ansible.builtin.file:
        path: /etc/systemd/system/cfwarp-dogfood-observer.timer
        state: absent
      notify: reload systemd

    - name: Remove legacy observer log directory
      ansible.builtin.file:
        path: /var/log/cfwarp-dogfood
        state: absent

    - name: Flush handlers after observer cleanup
      ansible.builtin.meta: flush_handlers

    - name: Ensure sing-box service is enabled and running
      ansible.builtin.systemd_service:
        name: "{{ singbox_service_name }}"
        state: started
        enabled: true

    - name: Show sing-box service status
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - "{{ singbox_service_name }}"
      register: singbox_service_status
      changed_when: false

    - name: Print sing-box service status
      ansible.builtin.debug:
        msg: "{{ singbox_service_name }} status => {{ singbox_service_status.stdout }}"
