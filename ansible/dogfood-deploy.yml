---
# dogfood-deploy.yml — deploy stable WireGuard/WARP and experimental MASQUE
# SOCKS proxies side-by-side on a remote Docker host.
#
# Usage:
#   ansible-playbook -i inventory.ini ansible/dogfood-deploy.yml --limit warp
#   ansible-playbook -i inventory.ini ansible/dogfood-deploy.yml --limit warp \
#     -e cfwarp_wireguard_image=ghcr.io/sparticle9/cfwarp-cli:latest-debian \
#     -e cfwarp_masque_image=ghcr.io/sparticle9/cfwarp-cli:latest
#
# Notes:
#   - WireGuard is the stable dogfood path.
#   - MASQUE is deployed in parallel for verification, but remains experimental.
#   - Both proxies bind only to 127.0.0.1 on the remote host.

- name: Deploy cfwarp dogfood stack
  hosts: warp
  become: true
  gather_facts: false

  vars:
    compose_dir: /opt/cfwarp-dogfood
    compose_file: docker-compose.yml
    env_file: .env
    cfwarp_wireguard_image: ghcr.io/sparticle9/cfwarp-cli:latest
    cfwarp_masque_image: ghcr.io/sparticle9/cfwarp-cli:latest
    cfwarp_wireguard_port: 18080
    cfwarp_masque_port: 18081
    cfwarp_wireguard_state_dir: /home/cfwarp/.local/state/cfwarp-cli
    cfwarp_masque_state_dir: /home/cfwarp/.local/state/cfwarp-cli
    cfwarp_log_level: info
    trace_interval_seconds: 60
    dogfood_enable_canary: false
    proxy_checks:
      - name: wireguard
        container_name: cfwarp-warp
        proxy_port: "{{ cfwarp_wireguard_port }}"
        state_dir: "{{ cfwarp_wireguard_state_dir }}"
        probe_attempts: 3
        probe_delay_seconds: 5
      - name: masque
        container_name: cfwarp-masque
        proxy_port: "{{ cfwarp_masque_port }}"
        state_dir: "{{ cfwarp_masque_state_dir }}"
        probe_attempts: 8
        probe_delay_seconds: 8

  tasks:
    - name: Ensure compose directory exists
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        mode: "0750"

    - name: Copy dogfood compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../deploy/docker-compose.dogfood.yml"
        dest: "{{ compose_dir }}/{{ compose_file }}"
        mode: "0640"

    - name: Write dogfood env file
      ansible.builtin.copy:
        dest: "{{ compose_dir }}/{{ env_file }}"
        mode: "0640"
        content: |
          CFWARP_WIREGUARD_IMAGE={{ cfwarp_wireguard_image }}
          CFWARP_MASQUE_IMAGE={{ cfwarp_masque_image }}
          CFWARP_WIREGUARD_PORT={{ cfwarp_wireguard_port }}
          CFWARP_MASQUE_PORT={{ cfwarp_masque_port }}
          CFWARP_WIREGUARD_STATE_DIR={{ cfwarp_wireguard_state_dir }}
          CFWARP_MASQUE_STATE_DIR={{ cfwarp_masque_state_dir }}
          CFWARP_LOG_LEVEL={{ cfwarp_log_level }}
          TRACE_INTERVAL_SECONDS={{ trace_interval_seconds }}

    - name: Pull dogfood images
      ansible.builtin.command:
        argv:
          - docker
          - pull
          - "{{ item }}"
      loop:
        - "{{ cfwarp_wireguard_image }}"
        - "{{ cfwarp_masque_image }}"
      changed_when: false

    - name: Start dogfood compose stack
      ansible.builtin.shell: >-
        docker compose
        {% if dogfood_enable_canary | bool %}--profile canary {% endif %}
        --env-file {{ env_file | quote }}
        -f {{ compose_file | quote }}
        up -d
      args:
        chdir: "{{ compose_dir }}"
        executable: /bin/bash
      changed_when: false

    - name: Wait for localhost-bound proxy ports
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ item }}"
        timeout: 120
        delay: 5
      loop:
        - "{{ cfwarp_wireguard_port }}"
        - "{{ cfwarp_masque_port }}"

    - name: Verify each proxy reaches Cloudflare trace with warp=on
      ansible.builtin.shell: |
        set -euo pipefail
        attempts={{ item.probe_attempts | int }}
        delay_seconds={{ item.probe_delay_seconds | int }}
        proxy_port={{ item.proxy_port | quote }}

        n=1
        while [ "$n" -le "$attempts" ]; do
          echo "== {{ item.name }} probe ${n}/${attempts} via socks5h://127.0.0.1:${proxy_port} =="
          if out=$(curl -fsSL --max-time 20 --proxy "socks5h://127.0.0.1:${proxy_port}" https://www.cloudflare.com/cdn-cgi/trace); then
            printf '%s\n' "$out"
            if printf '%s\n' "$out" | grep -q '^warp=on$'; then
              exit 0
            fi
          fi
          n=$((n + 1))
          sleep "$delay_seconds"
        done

        echo "trace probe failed for {{ item.name }}"
        exit 1
      args:
        executable: /bin/bash
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    - name: Capture runtime status JSON from each proxy container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ item.container_name }}"
          - cfwarp-cli
          - status
          - --json
          - --state-dir
          - "{{ item.state_dir }}"
      loop: "{{ proxy_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: proxy_status_json
      changed_when: false

    - name: Show runtime status JSON
      ansible.builtin.debug:
        msg: |
          {{ item.item.name }} =>
          {{ item.stdout }}
      loop: "{{ proxy_status_json.results }}"
      loop_control:
        label: "{{ item.item.name }}"
