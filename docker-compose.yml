services:
  cfwarp:
    image: ghcr.io/${DOCKER_IMAGE:-owner/cfwarp-cli}:${TAG:-latest}
    container_name: cfwarp
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:1080"
    environment:
      CFWARP_LISTEN_HOST: "0.0.0.0"
      CFWARP_LISTEN_PORT: "1080"
      CFWARP_PROXY_MODE: "socks5"
      CFWARP_ENDPOINT_OVERRIDE: ""
      CFWARP_LOG_LEVEL: "info"
      CFWARP_STATE_DIR: "/home/cfwarp/.local/state/cfwarp-cli"
      # For experimental native MASQUE mode, uncomment the following:
      # CFWARP_RUNTIME_FAMILY: "native"
      # CFWARP_TRANSPORT: "masque"
      # CFWARP_MODE: "http"
    volumes:
      - cfwarp-data:/home/cfwarp/.local/state/cfwarp-cli

volumes:
  cfwarp-data:
